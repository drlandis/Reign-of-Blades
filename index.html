<script>
(function(){
  // ── Generate app icon (192x192 canvas PNG) ──────────────────────────────
  function makeIcon(size){
    const cv=document.createElement("canvas");
    cv.width=cv.height=size;
    const ctx=cv.getContext("2d");
    // Background
    ctx.fillStyle="#06070e";
    ctx.beginPath();
    ctx.roundRect(0,0,size,size,size*0.18);
    ctx.fill();
    // Purple gradient overlay
    const g=ctx.createRadialGradient(size*.5,size*.4,0,size*.5,size*.5,size*.6);
    g.addColorStop(0,"#1a0a00");g.addColorStop(1,"#06070e");
    ctx.fillStyle=g;
    ctx.beginPath();
    ctx.roundRect(0,0,size,size,size*0.18);
    ctx.fill();
    // Sword emoji
    ctx.font=`${size*.52}px serif`;
    ctx.textAlign="center";
    ctx.textBaseline="middle";
    ctx.fillText("⚔️",size*.5,size*.52);
    // Title text
    ctx.fillStyle="var(--gold)";
    ctx.font=`900 ${size*.09}px 'Cinzel',serif`;
    ctx.fillText("REIGN OF SWORDS",size*.5,size*.88);
    return cv.toDataURL("image/png");
  }

  const icon192 = makeIcon(192);
  const icon512 = makeIcon(512);

  // Set apple-touch-icon
  document.getElementById("apple-touch-icon").href = icon192;

  // ── Create manifest blob ──────────────────────────────────────────────────
  const manifest = {
    name: "Reign of Swords",
    short_name: "Reign of Swords",
    description: "An AI-powered 5e SRD adventure game",
    start_url: "./",
    display: "standalone",
    orientation: "portrait-primary",
    background_color: "#06070e",
    theme_color: "#06070e",
    icons: [
      { src: icon192, sizes: "192x192", type: "image/png", purpose: "any maskable" },
      { src: icon512, sizes: "512x512", type: "image/png", purpose: "any maskable" },
    ],
    categories: ["games","entertainment"],
    screenshots: [],
  };
  const manifestBlob = new Blob([JSON.stringify(manifest)], {type:"application/manifest+json"});
  const manifestUrl = URL.createObjectURL(manifestBlob);
  document.getElementById("pwa-manifest").href = manifestUrl;

  // ── Register Service Worker (real file at ./sw.js) ───────────────────────
  if("serviceWorker" in navigator){
    navigator.serviceWorker.register("./sw.js", {scope:"./"})
      .then(reg=>{
        console.log("[RoS] SW registered", reg.scope);
        reg.update();
      })
      .catch(e=>console.warn("[RoS] SW registration skipped:", e.message));
  }

  // ── Install prompt capture ────────────────────────────────────────────────
  window._pwaInstallPrompt = null;
  window.addEventListener("beforeinstallprompt", e=>{
    e.preventDefault();
    window._pwaInstallPrompt = e;
    // Dispatch a custom event so React can react
    window.dispatchEvent(new Event("pwa-installable"));
  });
  window.addEventListener("appinstalled", ()=>{
    window._pwaInstallPrompt = null;
    window.dispatchEvent(new Event("pwa-installed"));
  });

  // ── Back button trap — push a dummy history entry so hardware back
  //    fires popstate instead of closing the app ─────────────────────────
  if(window.history && window.history.pushState){
    window.history.pushState({ros:true}, "", window.location.href);
    window.addEventListener("popstate", function(e){
      // Push again to keep the trap alive
      window.history.pushState({ros:true}, "", window.location.href);
      // Fire a custom event that React can listen to
      window.dispatchEvent(new Event("hardware-back"));
    });
  }
})();
</script>

async function callClaude(apiKey, sys, messages, maxTokens=900) {
  const r = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "x-api-key":apiKey,
      "anthropic-version":"2023-06-01",
      "anthropic-dangerous-direct-browser-access":"true",
    },
    body:JSON.stringify({model:MODEL,max_tokens:maxTokens,system:sys,messages}),
  });
  const d=await r.json();
  if(d.error) throw new Error(d.error.message);
  return d.content?.[0]?.text||"";
}

async function callClaudeWithImage(apiKey, prompt, imageB64, mediaType="image/jpeg") {
  const r = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "x-api-key":apiKey,
      "anthropic-version":"2023-06-01",
      "anthropic-dangerous-direct-browser-access":"true",
    },
    body:JSON.stringify({model:MODEL,max_tokens:50,messages:[{role:"user",content:[
      {type:"image",source:{type:"base64",media_type:mediaType,data:imageB64}},
      {type:"text",text:prompt},
    ]}]}),
  });
  const d=await r.json();
  if(d.error) throw new Error(d.error.message);
  return d.content?.[0]?.text||"";
}

async function compressMem(apiKey,old,existing,charName) {
  const hist=old.map(m=>`${m.role==="user"?charName:"DM"}: ${m.content}`).join("\n");
  const p=existing?`Prior summary:\n${existing}\n\nNew:\n${hist}\n\nUpdate (max 300 words). Plot, NPCs, decisions, items. Past tense.`:`Summarize (max 300 words):\n${hist}`;
  try{return await callClaude(apiKey,"D&D summarizer. Concise. No preamble.",[{role:"user",content:p}],400);}
  catch{return existing||"";}
}

function parseDM(text) {
  const rolls=[],items=[],quests=[];
  let enemies=null,milestone=null,xp=0,gold=0;
  const rx=/\[ROLL: d(\d+)(?: (adv|dis))? for ([^\]]+?)(?:\s+DC:(\d+))?\]/gi; let m;
  while((m=rx.exec(text))!==null) rolls.push({sides:parseInt(m[1]),adv:m[2]==="adv",dis:m[2]==="dis",reason:m[3].trim(),dc:m[4]?parseInt(m[4]):null});
  const cm=text.match(/\[COMBAT: ([^\]]+)\]/i);
  if(cm) enemies=cm[1].split(",").map((e,i)=>{const p=e.trim().split("|");const st=(p[1]||"20/14").split("/");return{id:`e${i}`,name:p[0].trim(),maxHp:parseInt(st[0])||20,hp:parseInt(st[0])||20,ac:parseInt(st[1])||14,conditions:[],isPlayer:false};});
  const qr=/\[QUEST: ([^\]]+)\]/gi; let qm; while((qm=qr.exec(text))!==null) quests.push(qm[1]);
  const msM=text.match(/\[MILESTONE: ([^\]]+)\]/i); if(msM) milestone=msM[1];
  const xpM=text.match(/\[XP: (\d+)\]/i); if(xpM) xp=parseInt(xpM[1]);
  const gM=text.match(/\[GOLD: (\d+)\]/i); if(gM) gold=parseInt(gM[1]);
  const ir=/\[ITEM: ([^\]]+)\]/gi; let im; while((im=ir.exec(text))!==null) items.push(im[1]);
  const clean=text.replace(/\[ROLL:[^\]]+\]/gi,"").replace(/\[COMBAT:[^\]]+\]/gi,"").replace(/\[QUEST:[^\]]+\]/gi,"").replace(/\[NPC:[^\]]+\]/gi,"").replace(/\[MILESTONE:[^\]]+\]/gi,"").replace(/\[XP:[^\]]+\]/gi,"").replace(/\[GOLD:[^\]]+\]/gi,"").replace(/\[ITEM:[^\]]+\]/gi,"").replace(/\n{3,}/g,"\n\n").trim();
  return{clean,rolls,enemies,milestone,xp,gold,items,quests,npcs};
}

// ═══════════════════ CHARACTER EXPORT / IMPORT ═══════════════════

function exportChar(char) {
  const data = JSON.stringify({...char, _ros_version:3, _exported:new Date().toISOString()}, null, 2);
  const blob = new Blob([data], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = `${char.name.replace(/\s+/g,"-")}.ros`;
  a.click(); URL.revokeObjectURL(url);
}

function importChar(file) {
  return new Promise((res,rej)=>{
    const reader = new FileReader();
    reader.onload = e => {
      try { const c=JSON.parse(e.target.result); if(!c.name||!c.cls) throw new Error("Invalid character file"); res(c); }
      catch(err) { rej(err); }
    };
    reader.readAsText(file);
  });
}

// ═══════════════════ COMBAT REDUCER ═══════════════════

function combatR(state,action){
  switch(action.type){
    case"START":{
      const{enemies,char,allies=[]}=action;
      const player={id:"player",name:char.name,maxHp:char.maxHp,hp:char.hp,ac:10+sm(char.stats.dex),initiative:rd(20)+sm(char.stats.dex),conditions:[],isPlayer:true,isAlly:false,deathSaves:{s:0,f:0}};
      const allyC=allies.map((a,i)=>({...a,id:`ally${i}`,initiative:rd(20)+3,isPlayer:false,isAlly:true,conditions:[],deathSaves:{s:0,f:0}}));
      const enemyC=enemies.map(e=>({...e,initiative:rd(20)+2,isPlayer:false,isAlly:false}));
      const all=[player,...allyC,...enemyC].sort((a,b)=>b.initiative-a.initiative);
      return{active:true,combatants:all,round:1,turnIdx:0,log:[`Combat begins! Order: ${all.map(cc=>`${cc.name}(${cc.initiative})`).join(", ")}`]};
    }
    case"HP":return{...state,combatants:state.combatants.map(c=>c.id===action.id?{...c,hp:cl(c.hp+action.delta,0,c.maxHp)}:c)};
    case"NEXT_TURN":{const n=(state.turnIdx+1)%state.combatants.length;const nr=n===0?state.round+1:state.round;return{...state,turnIdx:n,round:nr,log:[...state.log,nr>state.round?`— Round ${nr} —`:`${state.combatants[n]?.name}'s turn`].slice(-20)};}
    case"END":return{active:false,combatants:[],round:1,turnIdx:0,log:[]};
    case"ADD_LOG":return{...state,log:[...state.log,action.text].slice(-30)};
    case"DEATH_SAVE":return{...state,combatants:state.combatants.map(c=>{if(!c.isPlayer)return c;const ds={...c.deathSaves};if(action.success)ds.s=Math.min(3,ds.s+1);else ds.f=Math.min(3,ds.f+1);return{...c,deathSaves:ds};})};
    default:return state;
  }
}

// ═══════════════════ SWIPE SELECTOR ═══════════════════

function SwipeSelector({items,selected,onSelect,renderCard,label}){
  const [idx,setIdx]=useState(Math.max(0,items.findIndex(i=>i.name===selected)));
  const [dir,setDir]=useState(1);
  const tx=useRef(null);

  function go(delta){
    const next=cl(idx+delta,0,items.length-1);
    if(next===idx)return;
    setDir(delta>0?1:-1); setIdx(next); onSelect(items[next].name);
  }
  function onTS(e){tx.current=e.touches[0].clientX;}
  function onTE(e){if(tx.current===null)return;const diff=tx.current-e.changedTouches[0].clientX;if(Math.abs(diff)>40)go(diff>0?1:-1);tx.current=null;}

  useEffect(()=>{const ni=items.findIndex(i=>i.name===selected);if(ni>=0&&ni!==idx)setIdx(ni);},[selected]);

  const item=items[idx];
  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <span style={{fontFamily:"'Cinzel',serif",fontSize:".65rem",color:"var(--text4)",textTransform:"uppercase",letterSpacing:2}}>{label} — {idx+1}/{items.length}</span>
        <div style={{display:"flex",gap:8}}>
          {[-1,1].map(d=><button key={d} onClick={()=>go(d)} disabled={d<0?idx===0:idx===items.length-1} style={{background:"var(--bg3)",border:"1px solid var(--border2)",borderRadius:8,padding:"6px 14px",color:(d<0?idx===0:idx===items.length-1)?"var(--text4)":"var(--text3)",cursor:(d<0?idx===0:idx===items.length-1)?"not-allowed":"pointer",fontSize:"1rem"}}>{d<0?"←":"→"}</button>)}
        </div>
      </div>
      <div onTouchStart={onTS} onTouchEnd={onTE} style={{"--card-dir":dir>0?"60px":"-60px"}}>
        <div key={item.name} className={`swipe-card char-tile${selected===item.name?" sel":""}`} onClick={()=>onSelect(item.name)}>
          {renderCard(item,selected===item.name)}
        </div>
      </div>
      <div style={{display:"flex",justifyContent:"center",gap:5,marginTop:10}}>
        {items.map((it,i)=><button key={it.name} onClick={()=>go(i-idx)} style={{width:i===idx?18:6,height:6,borderRadius:3,background:i===idx?"var(--accent)":selected===it.name?"var(--accent2)":"var(--border)",border:"none",cursor:"pointer",transition:"all .2s",padding:0}}/>)}
      </div>
    </div>
  );
}

function DieFace({sides,value,rolling,dimmed,highlighted}){
  const c=DC[sides]||"var(--gold)";
  return <div style={{textAlign:"center"}}>
    <div style={{width:68,height:68,borderRadius:sides===20?"50%":sides===4?"8px":"12px",background:rolling?"#1a1200":dimmed?"var(--bg2)":`${c}1a`,border:`2px solid ${dimmed?"var(--border)":rolling?`${c}66`:c}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:value>9?"1.35rem":"1.6rem",fontWeight:900,fontFamily:"'Cinzel',serif",color:dimmed?"var(--border2)":rolling?`${c}88`:highlighted?"#fff":c,boxShadow:!rolling&&!dimmed?`0 0 18px ${c}44`:"none",transition:"all .08s",transform:rolling?`rotate(${Math.floor(Math.random()*40-20)}deg)`:"rotate(0deg)"}}>{value||"?"}</div>
    <div style={{fontSize:".6rem",color:dimmed?"var(--border2)":"var(--text4)",marginTop:4,textTransform:"uppercase",letterSpacing:1}}>d{sides}</div>
  </div>;
}

function DiceRoller({req,onComplete,onCancel,apiKey,autoRoll}){
  const{sides,count=1,modifiers=[],label="Roll",adv,dis}=req;
  const dc=(adv||dis)?2:count;
  const[phase,setPhase]=useState("rolling");
  const[disp,setDisp]=useState(Array.from({length:dc},()=>rd(sides)));
  const[finals,setFinals]=useState([]);
  // Camera dice state
  const[cameraMode,setCameraMode]=useState(false);
  const[cameraReady,setCameraReady]=useState(false);
  const[camResult,setCamResult]=useState(null);
  const[camLoading,setCamLoading]=useState(false);
  const[camErr,setCamErr]=useState("");
  const videoRef=useRef(null);
  const streamRef=useRef(null);
  const canvasRef=useRef(null);
  const intv=useRef(null);

  useEffect(()=>{
    if(autoRoll){
      // Skip animation, resolve immediately
      const f=Array.from({length:dc},()=>rd(sides));
      setFinals(f);setDisp(f);setPhase("result");
      return;
    }
    let t=0;
    intv.current=setInterval(()=>{
      setDisp(Array.from({length:dc},()=>rd(sides)));
      if(++t>=20){clearInterval(intv.current);const f=Array.from({length:dc},()=>rd(sides));setFinals(f);setDisp(f);setPhase("result");}
    },55);
    return()=>{clearInterval(intv.current);stopCam();};
  },[]);

  async function startCam(){
    setCameraMode(true);setCamErr("");setCamResult(null);
    try{
      const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment",width:{ideal:1280},height:{ideal:720}}});
      streamRef.current=stream;
      if(videoRef.current){videoRef.current.srcObject=stream;videoRef.current.play();}
      setCameraReady(true);
    }catch(e){setCamErr("Camera unavailable: "+e.message);setCameraMode(false);}
  }

  function stopCam(){
    if(streamRef.current){streamRef.current.getTracks().forEach(t=>t.stop());streamRef.current=null;}
    setCameraReady(false);setCameraMode(false);
  }

  async function snapAndRead(){
    if(!videoRef.current||!canvasRef.current||!apiKey)return;
    setCamLoading(true);setCamErr("");
    const v=videoRef.current,canvas=canvasRef.current;
    canvas.width=v.videoWidth||640;canvas.height=v.videoHeight||480;
    canvas.getContext("2d").drawImage(v,0,0);
    const b64=canvas.toDataURL("image/jpeg",.85).split(",")[1];
    try{
      const raw=await callClaudeWithImage(apiKey,`This is a photo of a physical die (d${sides}). What number is showing on the top face? Reply with ONLY the integer number, nothing else.`,b64,"image/jpeg");
      const num=parseInt(raw.trim());
      if(isNaN(num)||num<1||num>sides)throw new Error(`Couldn't read die — got: "${raw}"`);
      setCamResult(num);
    }catch(e){setCamErr(e.message);}
    setCamLoading(false);
  }

  function useCamResult(){
    if(camResult===null)return;
    stopCam();
    const f=[camResult,...Array.from({length:dc-1},()=>rd(sides))];
    setFinals(f);setDisp(f);setPhase("result");
  }

  const mt=modifiers.reduce((a,m)=>a+m.value,0);
  let ci=0;
  if(phase==="result"&&finals.length===2){if(adv)ci=finals[0]>=finals[1]?0:1;else ci=finals[0]<=finals[1]?0:1;}
  const dr=phase==="result"?((adv||dis)?finals[ci]:finals.reduce((a,v)=>a+v,0)):null;
  const total=dr!==null?dr+mt:null;
  const isCrit=sides===20&&dr===20,isFumble=sides===20&&dr===1;

  return (
    <div className="overlay" style={{display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{background:"var(--bg2)",border:"1px solid var(--border2)",borderRadius:20,padding:"24px 24px",width:320,textAlign:"center",boxShadow:"0 0 60px #4f46e566",animation:"slideUp .25s ease"}}>
        <div style={{fontFamily:"'Cinzel',serif",fontSize:".65rem",color:"var(--text4)",textTransform:"uppercase",letterSpacing:2,marginBottom:6}}>{label}</div>
        {(adv||dis)&&<div style={{fontSize:".7rem",color:adv?"#86efac":"#f87171",marginBottom:8,letterSpacing:1,textTransform:"uppercase"}}>{adv?"▲ Advantage":"▼ Disadvantage"}</div>}

        {/* Camera mode */}
        {cameraMode?(
          <div>
            <video ref={videoRef} playsInline muted style={{width:"100%",borderRadius:10,border:"1px solid var(--border2)",marginBottom:8,maxHeight:200,objectFit:"cover"}}/>
            <canvas ref={canvasRef} style={{display:"none"}}/>
            {camErr&&<div style={{color:"#ef4444",fontSize:".75rem",marginBottom:8}}>{camErr}</div>}
            {camResult!==null&&<div style={{fontFamily:"'Cinzel',serif",fontSize:"2rem",color:"#fff",fontWeight:900,marginBottom:8}}>Read: {camResult}</div>}
            <div style={{display:"flex",gap:8,marginBottom:8}}>
              {!camResult?<Btn onClick={snapAndRead} disabled={!cameraReady||camLoading} style={{flex:2}}>{camLoading?"Reading...":"📸 Read Die"}</Btn>:<Btn onClick={useCamResult} style={{flex:2}}>Use {camResult}</Btn>}
              <Btn variant="ghost" onClick={()=>{setCamResult(null);setCamErr("");}}>Retry</Btn>
            </div>
            <Btn variant="ghost" onClick={()=>{stopCam();setCamErr("");}} full>Cancel Camera</Btn>
          </div>
        ):(
          <>
            <div style={{display:"flex",gap:12,justifyContent:"center",margin:"16px 0"}}>
              {(phase==="rolling"?disp:finals).map((v,i)=><DieFace key={i} sides={sides} value={v} rolling={phase==="rolling"} dimmed={(adv||dis)&&phase==="result"&&i!==ci} highlighted={(adv||dis)?i===ci:true}/>)}
            </div>
            {phase==="result"&&isCrit&&<div style={{color:"#fbbf24",fontFamily:"'Cinzel',serif",fontSize:"1.15rem",fontWeight:900,marginBottom:8,animation:"critPulse 1s ease infinite",letterSpacing:2}}>★ CRITICAL HIT ★</div>}
            {phase==="result"&&isFumble&&<div style={{color:"#ef4444",fontFamily:"'Cinzel',serif",fontSize:"1rem",fontWeight:700,marginBottom:8}}>✗ FUMBLE</div>}
            {phase==="result"&&modifiers.length>0&&(
              <div style={{background:"#111827",border:"1px solid var(--border2)",borderRadius:10,padding:"10px 14px",marginBottom:12,textAlign:"left"}}>
                <div style={{fontSize:".62rem",color:"var(--text4)",textTransform:"uppercase",letterSpacing:1,fontFamily:"'Cinzel',serif",marginBottom:6}}>Breakdown</div>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:".85rem",color:"var(--text3)",marginBottom:3}}><span>Die</span><span style={{color:"var(--text)",fontWeight:700}}>{dr}</span></div>
                {modifiers.map((m,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:".85rem",color:"var(--text3)"}}><span>{m.label}</span><span style={{color:m.value>=0?"#86efac":"#f87171",fontWeight:700}}>{fm(m.value)}</span></div>)}
                <div style={{borderTop:"1px solid var(--border)",marginTop:8,paddingTop:8,display:"flex",justifyContent:"space-between"}}><span style={{fontFamily:"'Cinzel',serif",fontSize:".85rem",color:"var(--text2)"}}>Total</span><span style={{fontFamily:"'Cinzel',serif",fontSize:"1.5rem",color:"#fff",fontWeight:900}}>{total}</span></div>
              </div>
            )}
            {phase==="result"&&modifiers.length===0&&<div style={{fontFamily:"'Cinzel',serif",fontSize:"2.4rem",color:"#fff",fontWeight:900,marginBottom:12}}>{total}</div>}
            {phase==="rolling"&&<div style={{color:"var(--text4)",fontSize:".85rem",fontStyle:"italic",marginBottom:12}}>Rolling...</div>}
            {phase==="result"&&<div style={{display:"flex",gap:8,marginBottom:8}}><Btn variant="ghost" onClick={onCancel} size="sm" style={{flex:1}}>Cancel</Btn><Btn onClick={()=>onComplete(finals,total,dr,isCrit,isFumble)} style={{flex:2}}>Use Roll</Btn></div>}
            {apiKey&&phase==="result"&&<Btn variant="ghost" size="sm" onClick={startCam} full style={{marginTop:4}}>📸 Use Physical Die</Btn>}
            {apiKey&&phase==="rolling"&&<Btn variant="ghost" size="sm" onClick={startCam} full style={{marginTop:4}}>📸 Use Physical Die</Btn>}
          </>
        )}
      </div>
    </div>
  );
}

function JournalPanel({flags,setFlags,onClose}){
  const[tab,setTab]=useState("quests");
  const[notes,setNotes]=useState(()=>localStorage.getItem(SAVE_KEY+"_notes")||"");
  const[newQ,setNewQ]=useState("");

  function saveNotes(v){setNotes(v);localStorage.setItem(SAVE_KEY+"_notes",v);}
  function addQuest(){if(!newQ.trim())return;setFlags(f=>({...f,quests:[...(f.quests||[]),{name:newQ.trim(),status:"active",added:Date.now()}]}));setNewQ("");}
  function toggleQuest(i){setFlags(f=>({...f,quests:f.quests.map((q,qi)=>qi===i?{...q,status:q.status==="active"?"complete":"active"}:q)}));}
  function removeQuest(i){setFlags(f=>({...f,quests:f.quests.filter((_,qi)=>qi!==i)}));}

  const active=(flags.quests||[]).filter(q=>q.status==="active");
  const done=(flags.quests||[]).filter(q=>q.status==="complete");

  return (
    <div className="overlay" onClick={onClose}>
      <div className="panel" onClick={e=>e.stopPropagation()} style={{maxHeight:"85vh"}}>
        <div style={{padding:"16px 18px 0",borderBottom:"1px solid var(--border)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <span style={{fontFamily:"'Cinzel',serif",color:"#fbbf24",fontSize:"1.1rem"}}>📜 Journal</span>
            <button onClick={onClose} style={{background:"none",border:"none",color:"var(--text4)",fontSize:"1.4rem",cursor:"pointer"}}>✕</button>
          </div>
          <div style={{display:"flex",gap:0}}>
            {[["quests","Quests"],["notes","Notes"]].map(([t,l])=>(
              <button key={t} onClick={()=>setTab(t)} style={{flex:1,background:"none",border:"none",borderBottom:`2px solid ${tab===t?"#fbbf24":"transparent"}`,color:tab===t?"#fbbf24":"var(--text4)",padding:"8px 4px",fontSize:".7rem",cursor:"pointer",fontFamily:"'Cinzel',serif",textTransform:"uppercase",letterSpacing:1}}>{l}</button>
            ))}
          </div>
        </div>
        <div style={{padding:"14px 18px"}}>
          {tab==="quests"&&(
            <div>
              {/* Add quest */}
              <div style={{display:"flex",gap:8,marginBottom:16}}>
                <input value={newQ} onChange={e=>setNewQ(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addQuest()} placeholder="Add a quest..." style={{flex:1,background:"var(--bg3)",border:"1px solid var(--border2)",borderRadius:8,padding:"8px 12px",color:"var(--text)",fontSize:".9rem"}}/>
                <Btn onClick={addQuest} size="sm">Add</Btn>
              </div>
              {/* Active */}
              {active.length>0&&<>
                <div style={{fontSize:".62rem",color:"var(--text4)",textTransform:"uppercase",letterSpacing:2,fontFamily:"'Cinzel',serif",marginBottom:8}}>Active</div>
                {active.map((q,i)=>{
                  const realIdx=(flags.quests||[]).indexOf(q);
                  return <div key={i} style={{background:"var(--bg3)",border:"1px solid var(--border2)",borderRadius:10,padding:"10px 14px",marginBottom:8,display:"flex",alignItems:"center",gap:10}}>
                    <button onClick={()=>toggleQuest(realIdx)} style={{width:20,height:20,borderRadius:"50%",border:"2px solid #fbbf24",background:"transparent",cursor:"pointer",flexShrink:0}}/>
                    <span style={{flex:1,fontSize:".9rem",color:"var(--text2)"}}>{q.name}</span>
                    <button onClick={()=>removeQuest(realIdx)} style={{background:"none",border:"none",color:"var(--text4)",cursor:"pointer",fontSize:".9rem"}}>✕</button>
                  </div>;
                })}
              </>}
              {/* Complete */}
              {done.length>0&&<>
                <div style={{fontSize:".62rem",color:"var(--text4)",textTransform:"uppercase",letterSpacing:2,fontFamily:"'Cinzel',serif",margin:"14px 0 8px"}}>Completed</div>
                {done.map((q,i)=>{
                  const realIdx=(flags.quests||[]).indexOf(q);
                  return <div key={i} style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:10,padding:"10px 14px",marginBottom:8,display:"flex",alignItems:"center",gap:10,opacity:.6}}>
                    <button onClick={()=>toggleQuest(realIdx)} style={{width:20,height:20,borderRadius:"50%",border:"2px solid #86efac",background:"#86efac22",cursor:"pointer",flexShrink:0,fontSize:".8rem",color:"#86efac",display:"flex",alignItems:"center",justifyContent:"center"}}>✓</button>
                    <span style={{flex:1,fontSize:".9rem",color:"var(--text3)",textDecoration:"line-through"}}>{q.name}</span>
                    <button onClick={()=>removeQuest(realIdx)} style={{background:"none",border:"none",color:"var(--text4)",cursor:"pointer",fontSize:".9rem"}}>✕</button>
                  </div>;
                })}
              </>}
              {active.length===0&&done.length===0&&<div style={{textAlign:"center",color:"var(--text4)",fontSize:".85rem",fontStyle:"italic",padding:"20px 0"}}>No quests yet. The DM will add them automatically, or you can add your own.</div>}
            </div>
          )}
          {tab==="npcs"&&(
            <div>
              {Object.keys(flags.npcs||{}).length===0?(
                <div style={{textAlign:"center",color:"var(--text4)",fontSize:".85rem",fontStyle:"italic",padding:"20px 0"}}>No NPCs met yet. The DM will add them as you encounter key characters.</div>
              ):(
                Object.entries(flags.npcs||{}).map(([name,disposition])=>(
                  <div key={name} style={{background:"var(--bg3)",border:"1px solid var(--border2)",borderRadius:10,padding:"10px 14px",marginBottom:8,display:"flex",alignItems:"center",gap:12}}>
                    <div style={{width:32,height:32,borderRadius:"50%",background:"#1a1000",border:"1px solid var(--gold)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1rem",flexShrink:0}}>👤</div>
                    <div style={{flex:1}}>
                      <div style={{fontFamily:"'Cinzel',serif",fontSize:".9rem",color:"var(--text2)"}}>{name}</div>
                      <div style={{fontSize:".72rem",color:
                        disposition.toLowerCase().includes("hostile")?"#ef4444":
                        disposition.toLowerCase().includes("friendly")||disposition.toLowerCase().includes("ally")?"#86efac":
                        "#93c5fd",marginTop:2,textTransform:"capitalize"}}>{disposition}</div>
                    </div>
                  </div>
                ))
              )}
            </div>
          )}
          {tab==="notes"&&(
            <div>
              <textarea
                value={notes}
                onChange={e=>saveNotes(e.target.value)}
                placeholder="Free notes — people, places, clues, theories..."
                style={{width:"100%",background:"var(--bg3)",border:"1px solid var(--border2)",borderRadius:10,padding:12,color:"var(--text)",fontSize:".9rem",lineHeight:1.75,resize:"none",minHeight:260}}
              />
              <div style={{fontSize:".65rem",color:"var(--text4)",marginTop:6,textAlign:"right"}}>Auto-saved</div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ═══════════════════ STAT ROLLER ═══════════════════

function StatRoller({stats,setStats,race}){
  const[mode,setMode]=useState("standard");
  const[rolls,setRolls]=useState(null);
  const[amap,setAmap]=useState({});
  const[points,setPoints]=useState({str:10,dex:10,con:10,int:10,wis:10,cha:10});
  const[pLeft,setPLeft]=useState(12);
  const sRace=RACES.find(r=>r.name===race);

  function doRoll(){const r=SN.map(()=>roll4d6drop1());setRolls(r);setAmap({});setStats(Object.fromEntries(SN.map(s=>[s,8])));}

  function asgn(stat,idx,pool){
    const nm={...amap};Object.keys(nm).forEach(k=>{if(nm[k]===idx)delete nm[k];});if(idx!==null)nm[stat]=idx;setAmap(nm);
    const base={};SN.forEach(s=>{const i=nm[s];const b=sRace?.bonuses[s]||0;base[s]=(i!==undefined?pool[i]:8)+b;});setStats(base);
  }

  function adjPt(stat,delta){
    const cur=points[stat],next=cur+delta,nl=pLeft-delta;
    if(next<8||next>16||nl<0||nl>12)return;
    const np={...points,[stat]:next};setPoints(np);setPLeft(nl);
    const base={};SN.forEach(s=>{const b=sRace?.bonuses[s]||0;base[s]=np[s]+b;});setStats(base);
  }

  function switchMode(m){setMode(m);setAmap({});setRolls(null);setPoints({str:10,dex:10,con:10,int:10,wis:10,cha:10});setPLeft(12);setStats(Object.fromEntries(SN.map(s=>[s,8])));}

  return <div>
    <div style={{display:"flex",gap:6,marginBottom:18}}>
      {[["standard","Standard"],["pointbuy","Point Buy"],["roll","Dice Roll"]].map(([m,l])=>(
        <button key={m} onClick={()=>switchMode(m)} style={{flex:1,padding:"8px 0",borderRadius:8,border:`1px solid ${mode===m?"var(--accent)":"var(--border)"}`,background:mode===m?"#1a1000":"var(--bg2)",color:mode===m?"var(--text2)":"var(--text4)",fontFamily:"'Cinzel',serif",fontSize:".65rem",cursor:"pointer",textTransform:"uppercase",letterSpacing:.4}}>{l}</button>
      ))}
    </div>

    {mode==="standard"&&<div>
      <p style={{color:"var(--text3)",fontSize:".8rem",marginBottom:12,fontStyle:"italic"}}>Assign 15, 14, 13, 12, 10, 8 to your abilities.</p>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}}>
        {SA.map((v,i)=>{const used=Object.values(amap).includes(i);return<div key={i} style={{padding:"6px 14px",borderRadius:8,background:used?"var(--bg2)":"var(--bg3)",color:used?"var(--text4)":"var(--text2)",fontFamily:"'Cinzel',serif",fontSize:"1rem",fontWeight:700,textDecoration:used?"line-through":"none",border:`1px solid ${used?"var(--border)":"var(--accent)"}`,opacity:used?.5:1}}>{v}</div>;})}
      </div>
      <StatRows stats={stats} amap={amap} pool={SA} sRace={sRace} onAssign={(s,idx)=>asgn(s,idx,SA)} isIndex/>
    </div>}

    {mode==="pointbuy"&&<div>
      <div style={{background:"#111827",border:"1px solid var(--accent)",borderRadius:10,padding:"10px 14px",marginBottom:14,display:"flex",justifyContent:"space-between"}}>
        <span style={{fontFamily:"'Cinzel',serif",fontSize:".8rem",color:"var(--text3)"}}>Points remaining</span>
        <span style={{fontFamily:"'Cinzel',serif",fontSize:"1.4rem",color:pLeft===0?"#86efac":pLeft<=3?"#f59e0b":"var(--text2)",fontWeight:700}}>{pLeft}</span>
      </div>
      {SN.map(s=>{const racial=sRace?.bonuses[s]||0,base=points[s];return(
        <div key={s} style={{display:"flex",alignItems:"center",gap:10,background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:10,padding:"10px 12px",marginBottom:8}}>
          <span style={{width:108,fontSize:".88rem",color:"var(--text2)"}}>{SL[s]}{racial>0&&<span style={{fontSize:".62rem",color:"#86efac",marginLeft:4}}>+{racial}</span>}</span>
          <div style={{display:"flex",alignItems:"center",gap:8,flex:1}}>
            <button onClick={()=>adjPt(s,-1)} disabled={base<=8} style={{width:28,height:28,borderRadius:6,border:"none",background:base<=8?"var(--bg2)":"#7f1d1d44",color:base<=8?"var(--text4)":"#ef4444",cursor:base<=8?"not-allowed":"pointer",fontSize:"1rem"}} >-</button>
            <div style={{flex:1,textAlign:"center",fontSize:".85rem",color:"var(--text3)"}}>{base}</div>
            <button onClick={()=>adjPt(s,1)} disabled={base>=16||pLeft<=0} style={{width:28,height:28,borderRadius:6,border:"none",background:(base>=16||pLeft<=0)?"var(--bg2)":"#14532d44",color:(base>=16||pLeft<=0)?"var(--text4)":"#86efac",cursor:(base>=16||pLeft<=0)?"not-allowed":"pointer",fontSize:"1rem"}}>+</button>
          </div>
          <div style={{width:52,textAlign:"center"}}>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:"1.3rem",color:"var(--text2)",fontWeight:700,lineHeight:1}}>{stats[s]}</div>
            <div style={{fontSize:".72rem",color:sm(stats[s])>=0?"#86efac":"#f87171"}}>{fm(sm(stats[s]))}</div>
          </div>
        </div>
      );})}
    </div>}

    {mode==="roll"&&<div>
      <p style={{color:"var(--text3)",fontSize:".8rem",marginBottom:12,fontStyle:"italic"}}>Roll 4d6, drop lowest, six times. Assign to abilities.</p>
      {!rolls&&<Btn onClick={doRoll} full style={{marginBottom:14}}>🎲 Roll Stats</Btn>}
      {rolls&&<div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}}>
          {rolls.map((r,i)=>{const used=Object.values(amap).includes(i);return<div key={i} style={{padding:"8px 12px",borderRadius:8,background:used?"var(--bg2)":"var(--bg3)",border:`1px solid ${used?"var(--border)":"var(--accent)"}`,textAlign:"center",opacity:used?.5:1}}>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:"1.15rem",color:used?"var(--text4)":"var(--text2)",fontWeight:700,textDecoration:used?"line-through":"none"}}>{r.total}</div>
            <div style={{fontSize:".55rem",color:"var(--text4)"}}>{r.dice.map((d,j)=>j===0?<s key={j}>{d}</s>:<span key={j}>{d}</span>).reduce((a,b)=>[a,"+",b])}</div>
          </div>;})}
        </div>
        <Btn variant="ghost" onClick={doRoll} full style={{marginBottom:14}}>🎲 Re-roll</Btn>
        <StatRows stats={stats} amap={amap} pool={rolls.map(r=>r.total)} sRace={sRace} onAssign={(s,idx)=>asgn(s,idx,rolls.map(r=>r.total))} isIndex/>
      </div>}
    </div>}
  </div>;
}

function StatRows({stats,amap,pool,sRace,onAssign,isIndex}){
  return <div style={{display:"flex",flexDirection:"column",gap:8}}>
    {SN.map(s=>{
      const racial=sRace?.bonuses[s]||0;
      return <div key={s} style={{display:"flex",alignItems:"center",gap:10,background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:10,padding:"10px 12px"}}>
        <span style={{width:108,fontSize:".88rem",color:"var(--text2)"}}>{SL[s]}{racial>0&&<span style={{fontSize:".62rem",color:"#86efac",marginLeft:4}}>+{racial}</span>}</span>
        <select onChange={e=>onAssign(s,e.target.value!==""?parseInt(e.target.value):null)} value={amap[s]!==undefined?amap[s]:""} style={{flex:1,background:"var(--bg)",color:"var(--text)",border:"1px solid var(--border2)",borderRadius:8,padding:"8px 10px",fontSize:".95rem"}}>
          <option value="">--</option>
          {pool.map((v,i)=>{const taken=Object.entries(amap).find(([k,idx])=>idx===i&&k!==s);if(taken)return null;return<option key={i} value={i}>{v}</option>;})}
        </select>
        <div style={{width:52,textAlign:"center"}}>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:"1.3rem",color:"var(--text2)",fontWeight:700,lineHeight:1}}>{stats[s]}</div>
          <div style={{fontSize:".72rem",color:sm(stats[s])>=0?"#86efac":"#f87171"}}>{fm(sm(stats[s]))}</div>
        </div>
      </div>;
    })}
  </div>;
}

// ═══════════════════ CHARACTER CREATION ═══════════════════

function CharCreation({onComplete,apiKey}){
  const STEPS=["Start","Race","Class","Stats","Details","Backstory"];
  const[step,setStep]=useState(0);
  const[char,setChar]=useState({name:"",race:"",cls:"",background:"",backstory:"",stats:{str:8,dex:8,con:8,int:8,wis:8,cha:8},imageUrl:null,level:1,xp:0,hp:0,maxHp:0,inventory:[{name:"Adventurer's Pack",qty:1}],gold:50,notes:""});
  const[bsMode,setBsMode]=useState(null);
  const[bsP,setBsP]=useState("");
  const[bsDraft,setBsDraft]=useState("");
  const[bsLoad,setBsLoad]=useState(false);
  const[ficP,setFicP]=useState("");
  const[ficLoad,setFicLoad]=useState(false);
  const[importErr,setImportErr]=useState("");

  const canNext=[true,char.race!=="",char.cls!=="",SN.every(s=>char.stats[s]>8||char.stats[s]===8),char.name!==""&&char.background!=="",char.backstory!==""];

  function fin(){const c=CLASSES.find(c=>c.name===char.cls);const mh=(c?.hitDie||8)+sm(char.stats.con);onComplete({...char,maxHp:mh,hp:mh});}
  function usePregen(pg){const c=CLASSES.find(c=>c.name===pg.cls);const mh=(c?.hitDie||8)+sm(pg.stats.con);onComplete({...pg,level:1,xp:0,maxHp:mh,hp:mh,inventory:[{name:"Adventurer's Pack",qty:1}],gold:50,imageUrl:null,notes:""});}

  async function genBS(){
    if(!apiKey){alert("No API key.");return;}setBsLoad(true);
    const p=bsMode==="random"?`Vivid 2-paragraph D&D backstory for a ${char.race} ${char.cls} named ${char.name||"the adventurer"} with a ${char.background} background.`:`2-paragraph D&D backstory for a ${char.race} ${char.cls} named ${char.name||"the adventurer"}. Concept: ${bsP}`;
    try{const t=await callClaude(apiKey,"D&D lore writer. Vivid personal backstories. No preamble.",[{role:"user",content:p}],600);setBsDraft(t);}
    catch(e){setBsDraft("Error: "+e.message);}setBsLoad(false);
  }

  async function buildFic(){
    if(!apiKey){alert("No API key.");return;}setFicLoad(true);
    const p=`Character based on: "${ficP}". Output ONLY valid JSON (no markdown) with these keys: name, race (from: Human/Elf/Dwarf/Halfling/Gnome/Half-Orc/Tiefling/Dragonborn), cls (from: Fighter/Wizard/Rogue/Cleric/Paladin/Ranger/Barbarian/Bard/Sorcerer/Warlock), background (from: ${BACKGROUNDS.map(b=>b.name).join("/")}), stats (obj with str/dex/con/int/wis/cha, sum ~75, matching archetype), backstory (2 paragraphs).`;
    try{
      const raw=await callClaude(apiKey,"D&D character builder. JSON only, no markdown, no backticks.",[{role:"user",content:p}],600);
      const obj=JSON.parse(raw.replace(/```[a-z]*|```/g,"").trim());
      const c=CLASSES.find(c=>c.name===obj.cls);const mh=(c?.hitDie||8)+sm(obj.stats.con);
      onComplete({...char,...obj,level:1,xp:0,maxHp:mh,hp:mh,inventory:[{name:"Adventurer's Pack",qty:1}],gold:50,imageUrl:null,notes:""});
    }catch(e){alert("Build failed: "+e.message);}setFicLoad(false);
  }

  async function handleImport(e){
    const file=e.target.files[0];if(!file)return;
    try{const c=await importChar(file);const cls=CLASSES.find(x=>x.name===c.cls);const mh=c.maxHp||(cls?.hitDie||8)+sm(c.stats.con);onComplete({...c,maxHp:mh,hp:c.hp||mh});}
    catch(err){setImportErr("Invalid file: "+err.message);}
    e.target.value="";
  }

  return (
    <div className="screen" style={{background:"var(--bg)",position:"relative"}}>
      <Stars count={35}/>
      <div style={{position:"sticky",top:0,zIndex:20,background:"rgba(7,8,15,.95)",backdropFilter:"blur(12px)",borderBottom:"1px solid var(--border)",padding:"12px 16px"}}>
        <div style={{fontFamily:"'Cinzel',serif",fontSize:".62rem",color:"var(--text4)",textTransform:"uppercase",letterSpacing:3,marginBottom:8}}>{APP} · Character Creation</div>
        <div style={{display:"flex",gap:0}}>
          {STEPS.map((s,i)=><div key={s} style={{flex:1}}>
            <div style={{height:2,background:i<step?"var(--accent)":i===step?"var(--gold2)":"var(--border)",transition:"background .3s"}}/>
            <div style={{fontSize:".48rem",color:i===step?"var(--text2)":i<step?"var(--accent2)":"var(--text4)",textAlign:"center",marginTop:3,textTransform:"uppercase",fontFamily:"'Cinzel',serif"}}>{s}</div>
          </div>)}
        </div>
      </div>

      <div style={{padding:"20px 16px 120px",maxWidth:560,margin:"0 auto",position:"relative",zIndex:1}}>

        {step===0&&<div style={{animation:"fadeUp .4s ease"}}>
          <h2 style={{fontFamily:"'Cinzel',serif",fontSize:"1.35rem",color:"var(--text2)",marginBottom:20}}>Begin Your Legend</h2>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div onClick={()=>setStep(1)} style={{background:"var(--bg2)",border:"2px solid var(--accent)",borderRadius:14,padding:18,cursor:"pointer"}}>
              <div style={{fontFamily:"'Cinzel',serif",fontSize:"1rem",color:"var(--gold2)",marginBottom:5}}>Build a Character</div>
              <div style={{fontSize:".88rem",color:"var(--text3)"}}>Choose your race, class, and background.</div>
            </div>
            <div style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:14,padding:18}}>
              <div style={{fontFamily:"'Cinzel',serif",fontSize:".9rem",color:"var(--text3)",marginBottom:12}}>Pre-Generated Characters</div>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {PREGEN.map(pg=><div key={pg.name} onClick={()=>usePregen(pg)} style={{background:"var(--bg3)",border:"1px solid var(--border2)",borderRadius:10,padding:"12px 14px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div>
                    <div style={{fontFamily:"'Cinzel',serif",fontSize:".9rem",color:"var(--text2)"}}>{pg.name}</div>
                    <div style={{fontSize:".72rem",color:"var(--text4)"}}>{pg.race} {pg.cls} · {pg.background}</div>
                  </div>
                  <span style={{color:"var(--text4)",fontSize:"1rem"}}>→</span>
                </div>)}
              </div>
            </div>
            <div style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:14,padding:18}}>
              <div style={{fontFamily:"'Cinzel',serif",fontSize:".9rem",color:"var(--text3)",marginBottom:8}}>Build From Fiction</div>
              <div style={{fontSize:".78rem",color:"var(--text4)",marginBottom:10,fontStyle:"italic"}}>Name a character from any book, game, or film.</div>
              <input value={ficP} onChange={e=>setFicP(e.target.value)} placeholder="e.g. Legolas, Geralt, Hermione..." style={{width:"100%",background:"var(--bg3)",border:"1px solid var(--border2)",borderRadius:8,padding:"10px 12px",color:"var(--text)",fontSize:".95rem",marginBottom:10}}/>
              <Btn onClick={buildFic} disabled={ficLoad||!ficP.trim()} full>{ficLoad?"Building...":"Generate Character"}</Btn>
            </div>
            <div style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:14,padding:18}}>
              <div style={{fontFamily:"'Cinzel',serif",fontSize:".9rem",color:"var(--text3)",marginBottom:8}}>Import Character</div>
              <div style={{fontSize:".78rem",color:"var(--text4)",marginBottom:10,fontStyle:"italic"}}>Load a .ros file exported from a previous session.</div>
              {importErr&&<div style={{color:"#ef4444",fontSize:".78rem",marginBottom:8}}>{importErr}</div>}
              <input type="file" accept=".ros,.json" id="char-import" style={{display:"none"}} onChange={handleImport}/>
              <label htmlFor="char-import"><Btn as="span" variant="outline" full>📂 Import Character File</Btn></label>
            </div>
          </div>
        </div>}

        {step===1&&<div style={{animation:"fadeUp .4s ease"}}>
          <h2 style={{fontFamily:"'Cinzel',serif",fontSize:"1.35rem",color:"var(--text2)",marginBottom:6}}>Choose Your Race</h2>
          <p style={{color:"var(--text4)",fontSize:".82rem",marginBottom:16,fontStyle:"italic"}}>Swipe left/right or use arrows.</p>
          <SwipeSelector items={RACES} selected={char.race} onSelect={r=>setChar(c=>({...c,race:r}))} label="Race" renderCard={(race,sel)=>(
            <>
              <div>
                <div style={{fontFamily:"'Cinzel',serif",fontSize:"1.25rem",color:sel?"var(--gold2)":"var(--text2)",marginBottom:8}}>{race.name}</div>

                <div style={{fontSize:".9rem",color:"var(--text3)",lineHeight:1.72}}>{race.lore}</div>
              </div>
              {sel&&<div style={{marginTop:16,padding:"8px",background:"#5b21b644",border:"1px solid #7c3aed44",borderRadius:8,fontSize:".72rem",color:"var(--gold2)",fontFamily:"'Cinzel',serif",textAlign:"center"}}>✓ Selected</div>}
            </>
          )}/>
        </div>}

        {step===2&&<div style={{animation:"fadeUp .4s ease"}}>
          <h2 style={{fontFamily:"'Cinzel',serif",fontSize:"1.35rem",color:"var(--text2)",marginBottom:6}}>Choose Your Class</h2>
          <p style={{color:"var(--text4)",fontSize:".82rem",marginBottom:16,fontStyle:"italic"}}>Swipe left/right or use arrows.</p>
          <SwipeSelector items={CLASSES} selected={char.cls} onSelect={c=>setChar(ch=>({...ch,cls:c}))} label="Class" renderCard={(cls,sel)=>{
            const syn=cls.bestRaces.includes(char.race);
            return <>
              <div>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8,flexWrap:"wrap"}}>
                  <span style={{fontFamily:"'Cinzel',serif",fontSize:"1.25rem",color:sel?"var(--gold2)":"var(--text2)"}}>{cls.name}</span>
                  {syn&&<Tag color="var(--accent)">Synergy</Tag>}
                </div>
                <div style={{display:"flex",gap:6,marginBottom:14}}>
                  <Tag color="#4b5563">d{cls.hitDie} HP</Tag>
                  <Tag color="#4b5563">{cls.primary.map(s=>SS[s]).join("/")}</Tag>
                </div>
                <div style={{fontSize:".9rem",color:"var(--text3)",lineHeight:1.72}}>{cls.lore}</div>
              </div>
              {sel&&<div style={{marginTop:16,padding:"8px",background:"#5b21b644",border:"1px solid #7c3aed44",borderRadius:8,fontSize:".72rem",color:"var(--gold2)",fontFamily:"'Cinzel',serif",textAlign:"center"}}>✓ Selected</div>}
            </>;
          }}/>
        </div>}

        {step===3&&<div style={{animation:"fadeUp .4s ease"}}>
          <h2 style={{fontFamily:"'Cinzel',serif",fontSize:"1.35rem",color:"var(--text2)",marginBottom:14}}>Ability Scores</h2>
          <StatRoller stats={char.stats} setStats={s=>setChar(c=>({...c,stats:s}))} race={char.race}/>
        </div>}

        {step===4&&<div style={{animation:"fadeUp .4s ease"}}>
          <h2 style={{fontFamily:"'Cinzel',serif",fontSize:"1.35rem",color:"var(--text2)",marginBottom:18}}>Name &amp; Background</h2>
          <div style={{marginBottom:20}}>
            <label style={{fontSize:".68rem",color:"var(--text4)",textTransform:"uppercase",letterSpacing:1,fontFamily:"'Cinzel',serif"}}>Name</label>
            <input value={char.name} onChange={e=>setChar(c=>({...c,name:e.target.value}))} placeholder="Enter your name..." style={{display:"block",width:"100%",background:"var(--bg3)",border:"1px solid var(--border2)",borderRadius:10,padding:"12px 14px",color:"var(--text)",fontSize:"1.05rem",marginTop:8}}/>
          </div>
          <label style={{fontSize:".68rem",color:"var(--text4)",textTransform:"uppercase",letterSpacing:1,fontFamily:"'Cinzel',serif",marginBottom:10,display:"block"}}>Background</label>
          <SwipeSelector
            items={BACKGROUNDS}
            selected={char.background}
            onSelect={b=>setChar(ch=>({...ch,background:b}))}
            label="Background"
            renderCard={(bg,sel)=>(
              <>
                <div>
                  <div style={{fontFamily:"'Cinzel',serif",fontSize:"1.2rem",color:sel?"var(--gold2)":"var(--text2)",marginBottom:10}}>{bg.name}</div>
                  <div style={{fontSize:".92rem",color:"var(--text3)",lineHeight:1.75}}>{bg.desc}</div>
                </div>
                {sel&&<div style={{marginTop:14,padding:"8px",background:"#1a100044",border:"1px solid var(--gold)",borderRadius:8,fontSize:".72rem",color:"var(--gold)",fontFamily:"'Cinzel',serif",textAlign:"center"}}>✓ Selected</div>}
              </>
            )}
          />
        </div>}

        {step===5&&<div style={{animation:"fadeUp .4s ease"}}>
          <h2 style={{fontFamily:"'Cinzel',serif",fontSize:"1.35rem",color:"var(--text2)",marginBottom:18}}>Backstory</h2>
          {!bsMode&&<div style={{display:"flex",flexDirection:"column",gap:10}}>
            {[["write","Write My Own"],["ai","AI Prompt"],["random","Random"]].map(([m,l])=><div key={m} onClick={()=>setBsMode(m)} style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:12,padding:18,cursor:"pointer"}}>
              <div style={{fontFamily:"'Cinzel',serif",fontSize:".95rem",color:"var(--gold2)"}}>{l}</div>
            </div>)}
          </div>}
          {bsMode==="write"&&<textarea value={char.backstory} onChange={e=>setChar(c=>({...c,backstory:e.target.value}))} placeholder="Write your character's backstory..." rows={9} style={{width:"100%",background:"var(--bg3)",border:"1px solid var(--border2)",borderRadius:10,padding:14,color:"var(--text)",fontSize:".95rem",lineHeight:1.75,resize:"vertical"}}/>}
          {(bsMode==="ai"||bsMode==="random")&&!bsDraft&&<div>
            {bsMode==="ai"&&<textarea value={bsP} onChange={e=>setBsP(e.target.value)} placeholder="Describe a concept or theme..." rows={3} style={{width:"100%",background:"var(--bg3)",border:"1px solid var(--border2)",borderRadius:10,padding:12,color:"var(--text)",fontSize:".95rem",resize:"vertical",marginBottom:12}}/>}
            <Btn onClick={genBS} disabled={bsLoad} full>{bsLoad?"Generating...":"Generate Backstory"}</Btn>
          </div>}
          {bsDraft&&<div>
            <div style={{background:"var(--bg3)",border:"1px solid var(--border2)",borderRadius:10,padding:16,lineHeight:1.8,fontSize:".95rem",marginBottom:14,color:"var(--text2)"}}>{bsDraft}</div>
            <div style={{display:"flex",gap:10}}><Btn variant="ghost" onClick={()=>setBsDraft("")} size="sm" style={{flex:1}}>Redo</Btn><Btn onClick={()=>setChar(c=>({...c,backstory:bsDraft}))} style={{flex:2}}>Accept</Btn></div>
          </div>}
          {bsMode&&<button onClick={()=>{setBsMode(null);setBsDraft("");}} style={{background:"none",border:"none",color:"var(--text4)",fontSize:".8rem",cursor:"pointer",marginTop:12}}>← Back</button>}
        </div>}
      </div>

      <div style={{position:"fixed",bottom:0,left:0,right:0,background:"rgba(7,8,15,.95)",backdropFilter:"blur(12px)",borderTop:"1px solid var(--border)",padding:"12px 16px calc(12px + env(safe-area-inset-bottom))",display:"flex",gap:10,zIndex:30}}>
        {step>0&&<Btn variant="ghost" onClick={()=>setStep(s=>s-1)} style={{flex:1}}>← Back</Btn>}
        {step<STEPS.length-1?<Btn onClick={()=>setStep(s=>s+1)} disabled={!canNext[step]} style={{flex:2}}>Continue →</Btn>:<Btn onClick={fin} size="lg" disabled={!canNext[step]} style={{flex:2}}>Begin Legend</Btn>}
      </div>
    </div>
  );
}

function EquipmentGate({character,coliseumConfig,onEquipped,onBack}){
  const weapons=WEAPONS_BY_CLASS[character.cls]||WEAPONS_BY_CLASS.Fighter;
  const armorType=ARMOR_PROFICIENCY[character.cls]||"light";
  const armors=ARMOR_BY_CLASS[armorType]||ARMOR_BY_CLASS.light;
  const[weapon,setWeapon]=useState(weapons[0]);
  const[armor,setArmor]=useState(armors[0]);

  function enter(){
    onEquipped({...coliseumConfig,weapon,armor});
  }

  return <div className="overlay" onClick={onBack}>
    <div className="panel" onClick={e=>e.stopPropagation()} style={{maxHeight:"88vh"}}>
      <div style={{padding:"16px 18px 0",borderBottom:"1px solid var(--border)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:"1.1rem",color:"#ef4444",fontWeight:900}}>Arm Yourself</div>
          <button onClick={onBack} style={{background:"none",border:"none",color:"var(--text4)",fontSize:"1.4rem",cursor:"pointer"}}>✕</button>
        </div>
        <div style={{fontSize:".75rem",color:"var(--text3)",paddingBottom:14}}>Choose your weapon and armor before entering the arena.</div>
      </div>
      <div style={{padding:"14px 18px"}}>
        {/* Weapon */}
        <div style={{marginBottom:18}}>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:".72rem",color:"var(--text3)",textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Weapon</div>
          <div style={{display:"flex",flexDirection:"column",gap:7}}>
            {weapons.map(w=><div key={w.name} onClick={()=>setWeapon(w)}
              style={{background:weapon===w?"#1a0505":"var(--bg3)",border:`1px solid ${weapon===w?"#ef4444":"var(--border)"}`,borderRadius:10,padding:"10px 14px",cursor:"pointer",display:"flex",alignItems:"center",gap:12,transition:"all .15s"}}>
              <div style={{flex:1}}>
                <div style={{fontFamily:"'Cinzel',serif",fontSize:".88rem",color:weapon===w?"#ef4444":"var(--text2)"}}>{w.name}</div>
                <div style={{fontSize:".72rem",color:"var(--text4)",marginTop:2}}>{w.dmg} {w.type}{w.ranged?" · Ranged":""}{w.bonus?" · "+w.bonus:""}</div>
              </div>
              {weapon===w&&<div style={{color:"#ef4444"}}>✓</div>}
            </div>)}
          </div>
        </div>

        {/* Armor */}
        <div style={{marginBottom:20}}>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:".72rem",color:"var(--text3)",textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Armor ({armorType})</div>
          <div style={{display:"flex",flexDirection:"column",gap:7}}>
            {armors.map(a=><div key={a.name} onClick={()=>setArmor(a)}
              style={{background:armor===a?"#1a0505":"var(--bg3)",border:`1px solid ${armor===a?"#ef4444":"var(--border)"}`,borderRadius:10,padding:"10px 14px",cursor:"pointer",display:"flex",alignItems:"center",gap:12,transition:"all .15s"}}>
              <div style={{flex:1}}>
                <div style={{fontFamily:"'Cinzel',serif",fontSize:".88rem",color:armor===a?"#ef4444":"var(--text2)"}}>{a.name}</div>

function ColiseumModal({ character, onStart, onClose }) {
  const [arena,  setArena]  = useState(null);
  const [tier,   setTier]   = useState(null);
  const [party,  setParty]  = useState(PARTY_SIZES[0]);

  const recTier = ENEMY_TIERS.find(t => character.level >= t.minLv && character.level <= t.maxLv) || ENEMY_TIERS[0];

  function launch() {
    const chosenArena = arena || ARENAS[Math.floor(Math.random()*ARENAS.length)];
    const chosenTier  = tier  || recTier;
    onStart({ arena: chosenArena, tier: chosenTier, party });
  }

  return (
    <div className="overlay" onClick={onClose}>
      <div className="panel" onClick={e=>e.stopPropagation()} style={{maxHeight:"92vh"}}>
        {/* Header */}
        <div style={{padding:"18px 18px 0",borderBottom:"1px solid var(--border)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
            <div>
              <div style={{fontFamily:"'Cinzel',serif",fontSize:"1.3rem",color:"#ef4444",fontWeight:900}}>⚔ The Coliseum</div>
              <div style={{fontSize:".78rem",color:"var(--text3)",marginTop:2}}>Pure combat. No XP. No mercy. Just glory.</div>
            </div>
            <button onClick={onClose} style={{background:"none",border:"none",color:"var(--text4)",fontSize:"1.4rem",cursor:"pointer"}}>✕</button>
          </div>
          <div style={{fontSize:".65rem",color:"#ef444488",fontFamily:"'Cinzel',serif",letterSpacing:1,textTransform:"uppercase",paddingBottom:14}}>
            No experience earned · Trophies coming soon
          </div>
        </div>

        <div style={{padding:"14px 18px"}}>

          {/* ARENA */}
          <div style={{marginBottom:18}}>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:".72rem",color:"var(--text3)",textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Choose Your Battlefield</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7}}>
              {ARENAS.map(a=>(
                <div key={a.id} onClick={()=>setArena(arena?.id===a.id?null:a)}
                  style={{background:arena?.id===a.id?"#1a0505":"var(--bg3)",border:`1px solid ${arena?.id===a.id?"#ef4444":"var(--border)"}`,borderRadius:10,padding:"10px 12px",cursor:"pointer",transition:"all .15s"}}>
                  <div style={{fontSize:"1.1rem",marginBottom:3}}>{a.icon}</div>
                  <div style={{fontFamily:"'Cinzel',serif",fontSize:".78rem",color:arena?.id===a.id?"#ef4444":"var(--text2)",marginBottom:3}}>{a.name}</div>
                  <div style={{fontSize:".7rem",color:"var(--text4)",lineHeight:1.45}}>{a.desc}</div>
                </div>
              ))}
            </div>
            {!arena&&<div style={{fontSize:".7rem",color:"var(--text4)",textAlign:"center",marginTop:8,fontStyle:"italic"}}>Nothing selected — DM will choose the field.</div>}
          </div>

          {/* ENEMY TIER */}
          <div style={{marginBottom:18}}>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:".72rem",color:"var(--text3)",textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Enemy Difficulty</div>
            <div style={{display:"flex",flexDirection:"column",gap:7}}>
              {ENEMY_TIERS.map(t=>{
                const isRec=t===recTier, isSel=tier===t;
                return <div key={t.label} onClick={()=>setTier(tier===t?null:t)}
                  style={{background:isSel?"#1a0505":"var(--bg3)",border:`1px solid ${isSel?"#ef4444":isRec?"#ef444433":"var(--border)"}`,borderRadius:10,padding:"10px 14px",cursor:"pointer",display:"flex",alignItems:"center",gap:12,transition:"all .15s"}}>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <span style={{fontFamily:"'Cinzel',serif",fontSize:".88rem",color:isSel?"#ef4444":"var(--text2)"}}>{t.label}</span>
                      <span style={{fontSize:".62rem",color:"var(--text4)"}}>{t.sublabel}</span>
                      {isRec&&<span style={{fontSize:".55rem",background:"#ef444422",color:"#ef4444",border:"1px solid #ef444444",borderRadius:4,padding:"1px 5px",fontFamily:"'Cinzel',serif",letterSpacing:.5}}>REC</span>}
                    </div>
                    <div style={{fontSize:".75rem",color:"var(--text4)",marginTop:2}}>{t.desc}</div>
                  </div>
                  {isSel&&<div style={{color:"#ef4444",fontSize:"1rem"}}>✓</div>}
                </div>;
              })}
            </div>
            {!tier&&<div style={{fontSize:".7rem",color:"var(--text4)",textAlign:"center",marginTop:8,fontStyle:"italic"}}>Nothing selected — recommended tier used.</div>}
          </div>

          {/* PARTY SIZE */}
          <div style={{marginBottom:20}}>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:".72rem",color:"var(--text3)",textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Party Size</div>
            <div style={{display:"flex",gap:8}}>
              {PARTY_SIZES.map(p=>(
                <div key={p.label} onClick={()=>setParty(p)}
                  style={{flex:1,background:party===p?"#1a0505":"var(--bg3)",border:`1px solid ${party===p?"#ef4444":"var(--border)"}`,borderRadius:10,padding:"10px 8px",cursor:"pointer",textAlign:"center",transition:"all .15s"}}>
                  <div style={{fontFamily:"'Cinzel',serif",fontSize:".85rem",color:party===p?"#ef4444":"var(--text2)",marginBottom:3}}>{p.label}</div>
                  <div style={{fontSize:".65rem",color:"var(--text4)"}}>{p.desc}</div>
                </div>
              ))}
            </div>
          </div>

          <Btn onClick={launch} size="lg" full style={{background:"linear-gradient(135deg,#b91c1c,#ef4444)",borderColor:"#ef4444",color:"#fff",letterSpacing:1}}>
            Enter the Coliseum
          </Btn>
        </div>
      </div>
    </div>
  );
}
