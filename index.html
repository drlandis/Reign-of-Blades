<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#07080f"/>
<title>Reign of Swords</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>"/>
<link rel="apple-touch-icon" id="apple-touch-icon" href=""/>
<link rel="manifest" id="pwa-manifest" href=""/>
<meta name="apple-mobile-web-app-title" content="Reign of Swords"/>
<meta name="application-name" content="Reign of Swords"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>
:root {
  --fs: 16px;
  --bg: #0a0a0a;
  --bg2: #111111;
  --bg3: #1a1a1a;
  --border: #2e2e2e;
  --border2: #3d3d3d;
  --text: #f0f0f0;
  --text2: #d4d4d4;
  --text3: #a0a0a0;
  --text4: #666666;
  --accent: #c9a84c;
  --accent2: #9e6b1a;
  --gold: #c9a84c;
  --gold2: #f0c060;
  --maroon: #8b1a1a;
  --maroon2: #c0292929;
  --silver: #c0c0c0;
  --silver2: #e8e8e8;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}
/* Light mode */
body.light {
  --bg: #f0f0f0;
  --bg2: #e4e4e4;
  --bg3: #d8d8d8;
  --border: #b0b0b0;
  --border2: #909090;
  --text: #0a0a0a;
  --text2: #1a1a1a;
  --text3: #3a3a3a;
  --text4: #606060;
  --accent: #9e6b1a;
  --accent2: #7a4e0e;
}
body.light .overlay { background: rgba(0,0,0,.55); }
body.light .panel { box-shadow: 0 -8px 40px rgba(0,0,0,.2); }
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: var(--fs); height: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Crimson Text', Georgia, serif;
  height: 100%;
  overflow: hidden;
  -webkit-text-size-adjust: none;
}
#root { height: 100%; display: flex; flex-direction: column; }
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 2px; opacity:.5; }
input, textarea, select, button { font-family: inherit; }
input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
input, textarea, select { outline: none; }
.screen { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; }
.cinzel { font-family: 'Cinzel', serif; }

@keyframes fadeUp   { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeIn   { from{opacity:0} to{opacity:1} }
@keyframes slideUp  { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
@keyframes slideDown{ from{transform:translateY(-100%)} to{transform:translateY(0)} }
@keyframes twinkle  { from{opacity:.05} to{opacity:.45} }
@keyframes driftUp  { from{transform:translateY(0)} to{transform:translateY(-7px)} }
@keyframes critPulse{ 0%,100%{box-shadow:0 0 0 0 #fbbf2400} 50%{box-shadow:0 0 28px 8px #fbbf2466} }
@keyframes slideCard{ from{opacity:0;transform:translateX(var(--card-dir,60px))} to{opacity:1;transform:translateX(0)} }
@keyframes pulse    { 0%,100%{opacity:1} 50%{opacity:.5} }

.char-tile {
  background: var(--bg2);
  border: 2px solid var(--border);
  border-radius: 18px;
  padding: 26px 22px;
  min-height: 300px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  transition: border-color .2s, background .2s;
}
.char-tile.sel { border-color: var(--gold); background: #1a1000; }
.swipe-card { animation: slideCard .28s ease forwards; }

.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.75);
  z-index: 300;
  backdrop-filter: blur(8px);
}
.panel {
  position: fixed;
  left: 0; right: 0; bottom: 0;
  background: var(--bg2);
  border-top: 1px solid var(--border2);
  border-radius: 20px 20px 0 0;
  box-shadow: 0 -16px 60px rgba(0,0,0,.8);
  max-height: 88vh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding-bottom: calc(16px + var(--safe-bot));
  animation: slideUp .3s ease;
}
</style>
<script>
(function(){
  // ── Generate app icon (192x192 canvas PNG) ──────────────────────────────
  function makeIcon(size){
    const cv=document.createElement("canvas");
    cv.width=cv.height=size;
    const ctx=cv.getContext("2d");
    // Background
    ctx.fillStyle="#06070e";
    ctx.beginPath();
    ctx.roundRect(0,0,size,size,size*0.18);
    ctx.fill();
    // Purple gradient overlay
    const g=ctx.createRadialGradient(size*.5,size*.4,0,size*.5,size*.5,size*.6);
    g.addColorStop(0,"#1a0a00");g.addColorStop(1,"#06070e");
    ctx.fillStyle=g;
    ctx.beginPath();
    ctx.roundRect(0,0,size,size,size*0.18);
    ctx.fill();
    // Sword emoji
    ctx.font=`${size*.52}px serif`;
    ctx.textAlign="center";
    ctx.textBaseline="middle";
    ctx.fillText("⚔️",size*.5,size*.52);
    // Title text
    ctx.fillStyle="var(--gold)";
    ctx.font=`900 ${size*.09}px 'Cinzel',serif`;
    ctx.fillText("REIGN OF SWORDS",size*.5,size*.88);
    return cv.toDataURL("image/png");
  }

  let icon192 = "", icon512 = "";
  try{ icon192 = makeIcon(192); icon512 = makeIcon(512); }catch(e){ console.warn("[RoS] Icon gen failed",e); }
  try{ document.getElementById("apple-touch-icon").href = icon192; }catch(e){}

  // ── Create manifest blob ──────────────────────────────────────────────────
  const manifest = {
    name: "Reign of Swords",
    short_name: "Reign of Swords",
    description: "An AI-powered 5e SRD adventure game",
    start_url: "./",
    display: "standalone",
    orientation: "portrait-primary",
    background_color: "#06070e",
    theme_color: "#06070e",
    icons: [
      { src: icon192, sizes: "192x192", type: "image/png", purpose: "any maskable" },
      { src: icon512, sizes: "512x512", type: "image/png", purpose: "any maskable" },
    ],
    categories: ["games","entertainment"],
    screenshots: [],
  };
  try{
    const manifestBlob = new Blob([JSON.stringify(manifest)], {type:"application/manifest+json"});
    const manifestUrl = URL.createObjectURL(manifestBlob);
    document.getElementById("pwa-manifest").href = manifestUrl;
  }catch(e){ console.warn("[RoS] Manifest failed",e); }

  // ── Register Service Worker (real file at ./sw.js) ───────────────────────
  if("serviceWorker" in navigator){
    navigator.serviceWorker.register("./sw.js", {scope:"./"})
      .then(reg=>{
        console.log("[RoS] SW registered", reg.scope);
        reg.update();
      })
      .catch(e=>console.warn("[RoS] SW registration skipped:", e.message));
  }

  // ── Install prompt capture ────────────────────────────────────────────────
  window._pwaInstallPrompt = null;
  window.addEventListener("beforeinstallprompt", e=>{
    e.preventDefault();
    window._pwaInstallPrompt = e;
    // Dispatch a custom event so React can react
    window.dispatchEvent(new Event("pwa-installable"));
  });
  window.addEventListener("appinstalled", ()=>{
    window._pwaInstallPrompt = null;
    window.dispatchEvent(new Event("pwa-installed"));
  });

  // ── Back button trap — push a dummy history entry so hardware back
  //    fires popstate instead of closing the app ─────────────────────────
  if(window.history && window.history.pushState){
    window.history.pushState({ros:true}, "", window.location.href);
    window.addEventListener("popstate", function(e){
      // Push again to keep the trap alive
      window.history.pushState({ros:true}, "", window.location.href);
      // Fire a custom event that React can listen to
      window.dispatchEvent(new Event("hardware-back"));
    });
  }
})();
</script>
</head>
<body>
<div id="root"></div>
<div id="crash-screen" style="display:none;position:fixed;inset:0;background:#0a0a0a;color:#c9a84c;font-family:Georgia,serif;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;z-index:9999;overflow-y:auto;">
  <div style="font-size:2rem;margin-bottom:12px">⚔️</div>
  <div style="font-size:1.1rem;margin-bottom:6px;font-family:'Cinzel',serif">Reign of Swords</div>
  <div style="font-size:.8rem;color:#888;margin-bottom:16px">Loading error — details below</div>
  <div id="crash-detail" style="background:#111;border:1px solid #333;border-radius:8px;padding:12px;margin-bottom:20px;font-size:.72rem;color:#ef4444;text-align:left;word-break:break-all;max-width:320px;max-height:200px;overflow-y:auto;font-family:monospace;"></div>
  <button onclick="location.reload()" style="background:#8b1a1a;border:1px solid #c9a84c;color:#fff;padding:12px 24px;border-radius:8px;font-family:Georgia,serif;font-size:.9rem;cursor:pointer;margin-bottom:10px">Reload</button>
</div>
<script>
function showCrash(msg){
  var cr=document.getElementById("crash-screen");
  var cd=document.getElementById("crash-detail");
  if(cr){cr.style.display="flex";}
  if(cd){cd.textContent+=(cd.textContent?"
":"")+msg;}
}
window.onerror=function(msg,src,line,col,err){
  showCrash("ERROR: "+msg+"
File: "+src+"
Line: "+line+":"+col+(err?"
"+err.stack:""));
};
window.addEventListener("unhandledrejection",function(e){
  showCrash("PROMISE: "+(e.reason?.stack||e.reason?.message||String(e.reason)));
});
// Show crash screen if root is empty after 4 seconds
setTimeout(function(){
  var r=document.getElementById("root");
  if(r&&!r.hasChildNodes()){showCrash("React failed to mount after 4s. Root element is empty.");}
},4000);
</script>
<script src="./game.js"></script>
</body>
</html>
