  const[preview,setPreview]=useState(null);
  const[tab,setTab]=useState("lore");
  const[coliseumOpen,setColiseumOpen]=useState(false);
  const done=completedIds.length,unlocked=done>=3,legendary=done>=5;

  function DB({label,val,color}){return<div style={{marginBottom:8}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span style={{fontSize:".68rem",color:"var(--text3)",textTransform:"uppercase",letterSpacing:1}}>{label}</span><span style={{fontSize:".68rem",color}}>{["","Trivial","Mild","Moderate","Intense","Brutal"][val]}</span></div><div style={{height:4,background:"var(--border)",borderRadius:2}}><div style={{height:"100%",width:`${val*20}%`,background:color,borderRadius:2,transition:"width .4s"}}/></div></div>;}

  const[colConfig,setColConfig]=useState(null);
  const[equipOpen,setEquipOpen]=useState(false);

  function handleColiseumStart({arena,tier,party}){
    setColiseumOpen(false);
    setColConfig({arena,tier,party});
    setEquipOpen(true);
  }

  function handleEquipped({arena,tier,party,weapon,armor}){
    setEquipOpen(false);
    const sc = {
      id:"coliseum",
      title:"The Coliseum",
      isColiseum:true,
      arena, tier, party, weapon, armor,
      hook:`A ${arena.name} battle against ${tier.label}-tier enemies. ${party.count>1?`You have ${party.count-1} ally${party.count>2?"s":""}. `:""}No quarter given.`,
      lore:arena.id==="random"
        ? `The crowd goes silent. The gates creak open, and the arena reveals itself — chosen by fate and the Dungeon Master's whim.\n\nYour opponents enter from the far side. This is pure combat — no objectives, no mercy, no exit until one side falls.`
        : `The crowd goes silent as you step into ${arena.name}.\n\n${arena.desc}\n\nYour opponents enter from the far side. This is pure combat — no objectives, no mercy, no exit until one side falls.`,
    };
    onBegin(sc, character);
  }

  return <div className="screen" style={{background:"var(--bg)",position:"relative"}}>
    <Stars count={45}/>
    <div style={{position:"relative",zIndex:1,maxWidth:620,margin:"0 auto",padding:"28px 16px 80px"}}>
      <div style={{textAlign:"center",marginBottom:22}}>
        <div style={{fontFamily:"'Cinzel',serif",fontSize:".6rem",color:"var(--text3)",letterSpacing:4,textTransform:"uppercase",marginBottom:10}}>{APP} · World Arc</div>
        <h1 style={{fontFamily:"'Cinzel',serif",fontSize:"1.75rem",fontWeight:900,color:"#fff",lineHeight:1.1,marginBottom:10}}>Choose Your Chapter</h1>
        <div style={{display:"inline-flex",alignItems:"center",gap:10,background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:24,padding:"6px 16px 6px 8px",marginTop:8}}>
          <div style={{width:28,height:28,borderRadius:"50%",background:"var(--bg3)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:".9rem"}}>⚔️</div>
          <div style={{textAlign:"left"}}><div style={{fontFamily:"'Cinzel',serif",fontSize:".8rem",color:"var(--text2)"}}>{character.name}</div><div style={{fontSize:".62rem",color:"var(--text3)"}}>Lv.{character.level} {character.race} {character.cls}</div></div>
        </div>
        <div style={{marginTop:12}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:4,fontSize:".62rem",color:"var(--text3)",fontFamily:"'Cinzel',serif",textTransform:"uppercase",letterSpacing:1}}><span>World Arc</span><span>{done}/5</span></div>
          <div style={{height:4,background:"var(--border)",borderRadius:2}}><div style={{height:"100%",width:`${(done/5)*100}%`,borderRadius:2,background:legendary?"linear-gradient(90deg,var(--gold),var(--gold2))":"linear-gradient(90deg,var(--maroon),var(--gold))",transition:"width .8s"}}/></div>
        </div>
      </div>

      {/* Story chapters */}
      {SCENARIOS.map((sc,i)=>{const isD=completedIds.includes(sc.id);return(
        <div key={sc.id} onClick={()=>{setPreview(sc);setTab("lore");}} style={{background:"var(--bg2)",border:`1px solid ${isD?sc.accent+"66":"var(--border)"}`,borderRadius:14,padding:"15px 16px 12px",cursor:"pointer",marginBottom:10,position:"relative",overflow:"hidden",animation:`fadeUp .4s ease ${i*.07}s both`}}>
          {isD&&<div style={{position:"absolute",top:10,right:-22,background:sc.accent,color:"#000",fontSize:".5rem",fontWeight:700,padding:"2px 28px",transform:"rotate(45deg)",fontFamily:"'Cinzel',serif"}}>DONE</div>}
          <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
            <div style={{flexShrink:0,textAlign:"center"}}><div style={{width:44,height:44,borderRadius:10,background:sc.glow,border:`1px solid ${sc.accent}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.2rem",marginBottom:3}}>{sc.icon}</div><div style={{fontSize:".5rem",color:"var(--text3)",fontFamily:"'Cinzel',serif"}}>CH.{sc.chapter}</div></div>
            <div style={{flex:1}}>
              <div style={{display:"flex",alignItems:"baseline",gap:8,flexWrap:"wrap"}}><span style={{fontFamily:"'Cinzel',serif",fontSize:"1rem",color:sc.accent}}>{sc.title}</span><span style={{fontSize:".7rem",color:"var(--text3)",fontStyle:"italic"}}>Lv {sc.levelRange[0]}–{sc.levelRange[1]}</span></div>
              <div style={{fontSize:".78rem",color:"var(--text2)",fontStyle:"italic",marginTop:1,marginBottom:6}}>{sc.subtitle}</div>
              <div style={{fontSize:".9rem",color:"var(--text2)",lineHeight:1.6}}>{sc.hook}</div>
              <div style={{display:"flex",gap:4,flexWrap:"wrap",marginTop:8}}>{sc.tags.map(t=><Tag key={t} color={sc.accent}>{t}</Tag>)}</div>
            </div>
          </div>
        </div>
      );})}

      {/* Divider */}
      <div style={{borderTop:"1px solid var(--border)",margin:"16px 0",display:"flex",alignItems:"center",gap:10}}>
        <div style={{flex:1,height:1,background:"linear-gradient(90deg,transparent,var(--border))"}}/>
        <span style={{fontSize:".58rem",color:"var(--text3)",textTransform:"uppercase",letterSpacing:2,fontFamily:"'Cinzel',serif"}}>Arenas</span>
        <div style={{flex:1,height:1,background:"linear-gradient(90deg,var(--border),transparent)"}}/>
      </div>

      {/* THE COLISEUM */}
      <div onClick={()=>setColiseumOpen(true)} style={{background:"#160505",border:"2px solid #7f1d1d",borderRadius:14,padding:18,cursor:"pointer",marginBottom:10,transition:"all .2s",position:"relative",overflow:"hidden",animation:"fadeUp .4s ease .38s both"}}>
        {/* Blood-red glow top bar */}
        <div style={{position:"absolute",top:0,left:0,right:0,height:2,background:"linear-gradient(90deg,transparent,#ef4444,transparent)"}}/>
        <div style={{display:"flex",gap:14,alignItems:"center"}}>
          <div style={{width:52,height:52,borderRadius:12,background:"#ef444422",border:"2px solid #7f1d1d",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.5rem",flexShrink:0,animation:"driftUp 3s ease-in-out infinite alternate"}}>⚔</div>
          <div style={{flex:1}}>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:"1.15rem",color:"#ef4444",fontWeight:900,marginBottom:4}}>The Coliseum</div>
            <div style={{fontSize:".82rem",color:"#fca5a5",marginBottom:6}}>Pure combat. Generated battlefield. Level-matched enemies.</div>
            <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
              <Tag color="#ef4444">Combat Only</Tag>
              <Tag color="#ef4444">No XP</Tag>
              <Tag color="#ef4444">Any Level</Tag>
            </div>
          </div>
        </div>
        <div style={{marginTop:12,fontSize:".75rem",color:"#7f1d1d",fontFamily:"'Cinzel',serif",textAlign:"right",letterSpacing:1,textTransform:"uppercase"}}>Trophies · PvP — Coming Soon</div>
      </div>

      {/* Open World */}
      <div style={{borderTop:"1px solid var(--border)",margin:"16px 0",display:"flex",alignItems:"center",gap:10}}>
        <div style={{flex:1,height:1,background:"linear-gradient(90deg,transparent,var(--border))"}}/>
        <span style={{fontSize:".58rem",color:"var(--text3)",textTransform:"uppercase",letterSpacing:2,fontFamily:"'Cinzel',serif"}}>Open World</span>
        <div style={{flex:1,height:1,background:"linear-gradient(90deg,var(--border),transparent)"}}/>
      </div>

      <div onClick={()=>unlocked&&onBegin(null,character)} style={{background:unlocked?"#0d1a0e":"var(--bg2)",border:`2px solid ${unlocked?legendary?"#fbbf24":"#fbbf2444":"var(--border)"}`,borderRadius:14,padding:18,cursor:unlocked?"pointer":"not-allowed",opacity:unlocked?1:.5}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:48,height:48,borderRadius:12,background:unlocked?"#fbbf2422":"var(--bg3)",border:`2px solid ${unlocked?"#fbbf24":"var(--border2)"}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.2rem",animation:unlocked?"driftUp 3s ease-in-out infinite alternate":"none"}}>✦</div>
          <div><div style={{fontFamily:"'Cinzel',serif",fontSize:"1.05rem",color:unlocked?"#fbbf24":"var(--text3)",fontWeight:900}}>The Open World</div><div style={{fontSize:".82rem",color:"var(--text3)",marginTop:3,fontStyle:"italic"}}>{unlocked?"Infinite. Responsive. Alive.":`Complete ${3-done} more chapter${3-done!==1?"s":""} to unlock.`}</div></div>
        </div>
      </div>

      <button onClick={onNewChar} style={{display:"block",width:"100%",background:"none",border:"1px dashed var(--border)",borderRadius:12,padding:12,color:"var(--text3)",fontSize:".78rem",cursor:"pointer",fontFamily:"'Cinzel',serif",textTransform:"uppercase",letterSpacing:1,marginTop:10}}>+ New Character</button>
    </div>

    {/* Story preview sheet */}
    {preview&&<div className="overlay" onClick={()=>setPreview(null)}>
      <div className="panel" onClick={e=>e.stopPropagation()}>
        <div style={{padding:"18px 18px 0",background:`linear-gradient(180deg,${preview.glow} 0%,transparent 100%)`,borderBottom:`1px solid ${preview.accent}22`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
            <div><div style={{fontSize:"1.4rem",marginBottom:4}}>{preview.icon}</div><div style={{fontFamily:"'Cinzel',serif",fontSize:"1.15rem",color:preview.accent,fontWeight:600}}>{preview.title}</div><div style={{fontSize:".72rem",color:"var(--text3)",fontStyle:"italic",marginTop:2}}>Ch.{preview.chapter} · {preview.setting}</div></div>
            <button onClick={()=>setPreview(null)} style={{background:"none",border:"none",color:"var(--text3)",fontSize:"1.4rem",cursor:"pointer"}}>✕</button>
          </div>
          <div style={{display:"flex"}}>{["lore","challenge","party"].map(t=><button key={t} onClick={()=>setTab(t)} style={{flex:1,background:"none",border:"none",borderBottom:`2px solid ${tab===t?preview.accent:"transparent"}`,color:tab===t?preview.accent:"var(--text3)",padding:"8px 4px",fontSize:".68rem",cursor:"pointer",fontFamily:"'Cinzel',serif",textTransform:"uppercase",letterSpacing:1}}>{t==="lore"?"Story":t==="challenge"?"Difficulty":"Party"}</button>)}</div>
        </div>
        <div style={{padding:"14px 18px"}}>
          {tab==="lore"&&<div style={{fontSize:".95rem",color:"var(--text2)",lineHeight:1.85}}>{preview.lore.split("\n\n").map((p,i)=><p key={i} style={{marginBottom:12}}>{p}</p>)}</div>}
          {tab==="challenge"&&<div><DB label="Combat" val={preview.difficulty.combat} color={preview.accent}/><DB label="Roleplay" val={preview.difficulty.roleplay} color={preview.accent}/><DB label="Exploration" val={preview.difficulty.exploration} color={preview.accent}/></div>}
          {tab==="party"&&<div style={{fontSize:".92rem",color:"var(--text2)",lineHeight:1.85}}>{preview.partyTip}</div>}
        </div>
        <div style={{padding:"0 18px 18px"}}><Btn onClick={()=>{setPreview(null);onBegin(preview,character);}} size="lg" full style={{background:`linear-gradient(135deg,${preview.accent},${preview.accent}cc)`,color:"#000",borderColor:preview.accent}}>Begin Adventure</Btn></div>
      </div>
    </div>}

    {/* Coliseum modal */}
    {coliseumOpen&&<ColiseumModal character={character} onStart={handleColiseumStart} onClose={()=>setColiseumOpen(false)}/>}
    {/* Equipment gate */}
    {equipOpen&&colConfig&&<EquipmentGate character={character} coliseumConfig={colConfig} onEquipped={handleEquipped} onBack={()=>setEquipOpen(false)}/>}
  </div>;
}


// ═══════════════════ CHARACTER SHEET (SWIPEABLE) ═══════════════════

const CASTER_CLASSES = ["Wizard","Sorcerer","Warlock","Cleric","Druid","Bard","Paladin","Ranger"];
const HALF_CASTERS   = ["Paladin","Ranger"];
const SPELL_SLOTS_BY_LEVEL = {
  // [level] = [1st,2nd,3rd,4th,5th,6th,7th,8th,9th]
  1:[2],2:[3],3:[4,2],4:[4,3],5:[4,3,2],6:[4,3,3],7:[4,3,3,1],8:[4,3,3,2],9:[4,3,3,3,1],
  10:[4,3,3,3,2],11:[4,3,3,3,2,1],12:[4,3,3,3,2,1],13:[4,3,3,3,2,1,1],
  14:[4,3,3,3,2,1,1],15:[4,3,3,3,2,1,1,1],16:[4,3,3,3,2,1,1,1],
  17:[4,3,3,3,2,1,1,1,1],18:[4,3,3,3,3,1,1,1,1],19:[4,3,3,3,3,2,1,1,1],20:[4,3,3,3,3,2,2,1,1],
};
const WARLOCK_SLOTS = {1:[1,1],2:[2,1],3:[2,2],4:[2,2],5:[2,3],6:[2,3],7:[2,4],8:[2,4],9:[2,5],10:[2,5],11:[3,5],17:[4,5],};

const SKILLS_ORDERED = [
  {name:"Acrobatics",  stat:"dex"},{name:"Animal Handling",stat:"wis"},{name:"Arcana",     stat:"int"},
  {name:"Athletics",   stat:"str"},{name:"Deception",     stat:"cha"},{name:"History",     stat:"int"},
  {name:"Insight",     stat:"wis"},{name:"Intimidation",  stat:"cha"},{name:"Investigation",stat:"int"},
  {name:"Medicine",    stat:"wis"},{name:"Nature",        stat:"int"},{name:"Perception",  stat:"wis"},
  {name:"Performance", stat:"cha"},{name:"Persuasion",    stat:"cha"},{name:"Religion",    stat:"int"},
  {name:"Sleight of Hand",stat:"dex"},{name:"Stealth",   stat:"dex"},{name:"Survival",    stat:"wis"},
];

const CLASS_PROFICIENCIES = {
  Fighter:  ["Athletics","Acrobatics","Intimidation","Perception","Survival","Animal Handling"],
  Wizard:   ["Arcana","History","Insight","Investigation","Medicine","Religion"],
  Rogue:    ["Acrobatics","Athletics","Deception","Insight","Intimidation","Investigation","Perception","Performance","Persuasion","Sleight of Hand","Stealth"],
  Cleric:   ["History","Insight","Medicine","Persuasion","Religion"],
  Paladin:  ["Athletics","Insight","Intimidation","Medicine","Persuasion","Religion"],
  Ranger:   ["Animal Handling","Athletics","Insight","Investigation","Nature","Perception","Stealth","Survival"],
  Barbarian:["Animal Handling","Athletics","Intimidation","Nature","Perception","Survival"],
  Bard:     ["Acrobatics","Animal Handling","Arcana","Athletics","Deception","History","Insight","Intimidation","Investigation","Medicine","Nature","Perception","Performance","Persuasion","Religion","Sleight of Hand","Stealth","Survival"],
  Sorcerer: ["Arcana","Deception","Insight","Intimidation","Persuasion","Religion"],
  Warlock:  ["Arcana","Deception","History","Intimidation","Investigation","Nature","Religion"],
};

// Silhouette SVG — clean humanoid outline with slot indicators
function Silhouette({char}){
  const inv = char.inventory||[];
  function hasSlot(keywords){return inv.some(i=>keywords.some(k=>i.name.toLowerCase().includes(k)));}

  const slots = [
    {id:"head",   label:"Head",   x:105,y:28,  w:50,h:44, keywords:["helm","hat","hood","crown","cap"]},
    {id:"chest",  label:"Chest",  x:76, y:92,  w:108,h:70,keywords:["armor","mail","plate","robe","coat","breastplate","leather","studded","chain","scale","splint"]},
    {id:"weapon", label:"Weapon", x:18, y:100, w:52,h:26, keywords:["sword","axe","bow","staff","dagger","mace","hammer","spear","crossbow","rapier","warhammer","maul","glaive","flail"]},
    {id:"offhand",label:"Off Hand",x:190,y:100,w:52,h:26, keywords:["shield","focus","orb","tome","lute","wand"]},
    {id:"hands",  label:"Hands",  x:18, y:140, w:52,h:22, keywords:["glove","gauntlet","bracer","bracers"]},
    {id:"legs",   label:"Legs",   x:82, y:182, w:42,h:60, keywords:["leg","trouser","greave","pants"]},
    {id:"legs2",  label:"",       x:136,y:182, w:42,h:60, keywords:["leg","trouser","greave","pants"]},
    {id:"feet",   label:"Boots",  x:76, y:252, w:52,h:22, keywords:["boot","shoe","sandal","slipper"]},
    {id:"ring",   label:"Ring",   x:6,  y:172, w:38,h:18, keywords:["ring","band"]},
    {id:"neck",   label:"Neck",   x:96, y:72,  w:68,h:16, keywords:["necklace","amulet","cloak","pendant","collar"]},
    {id:"back",   label:"Cloak",  x:214,y:92,  w:38,h:60, keywords:["cloak","cape","mantle","pack","bag"]},
  ];

  // Collect equipped items for labels
  const equipped = slots.map(s=>({
    ...s,
    item: inv.find(i=>s.keywords.some(k=>i.name.toLowerCase().includes(k))),
    active: hasSlot(s.keywords),
  })).filter(s=>s.label); // skip duplicate legs2

  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:0}}>
      <svg viewBox="0 0 260 290" style={{width:"100%",maxWidth:260,height:"auto"}} aria-label="Character silhouette">
        <defs>
          <filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        </defs>

        {/* Body silhouette path — simple humanoid */}
        <g opacity=".18" fill="var(--text3)">
          {/* Head */}
          <ellipse cx="130" cy="38" rx="24" ry="28"/>
          {/* Neck */}
          <rect x="122" y="62" width="16" height="14" rx="4"/>
          {/* Torso */}
          <path d="M88 76 Q76 78 72 100 L68 162 Q80 168 130 168 Q180 168 192 162 L188 100 Q184 78 172 76 Q160 72 130 72 Q100 72 88 76Z"/>
          {/* Left arm */}
          <path d="M72 82 Q58 86 48 108 Q40 128 42 158 Q46 162 54 160 Q62 156 66 136 L72 106Z"/>
          {/* Right arm */}
          <path d="M188 82 Q202 86 212 108 Q220 128 218 158 Q214 162 206 160 Q198 156 194 136 L188 106Z"/>
          {/* Left leg */}
          <path d="M94 166 Q84 172 80 200 L78 256 Q84 262 96 260 Q108 258 110 232 L112 168Z"/>
          {/* Right leg */}
          <path d="M166 166 Q176 172 180 200 L182 256 Q176 262 164 260 Q152 258 150 232 L148 168Z"/>
          {/* Left foot */}
          <ellipse cx="87" cy="262" rx="18" ry="10"/>
          {/* Right foot */}
          <ellipse cx="173" cy="262" rx="18" ry="10"/>
        </g>

        {/* Slot indicators */}
        {slots.map(slot=>{
          const active = hasSlot(slot.keywords);
          const col = active?"var(--gold)":"#2e3254";
          const textCol = active?"var(--silver2)":"#404470";
          const item = inv.find(i=>slot.keywords.some(k=>i.name.toLowerCase().includes(k)));
          return (
            <g key={slot.id}>
              <rect x={slot.x} y={slot.y} width={slot.w} height={slot.h} rx="5"
                fill={active?"#7c3aed18":"#0c0e1e88"}
                stroke={col} strokeWidth={active?1.5:1}
                filter={active?"url(#glow)":"none"}
              />
              {slot.label&&<text x={slot.x+slot.w/2} y={slot.y+slot.h/2-2} textAnchor="middle"
                fill={textCol} fontSize="7" fontFamily="'Cinzel',serif" dominantBaseline="middle"
                style={{textTransform:"uppercase",letterSpacing:.5}}>
                {slot.label}
              </text>}
              {item&&<text x={slot.x+slot.w/2} y={slot.y+slot.h/2+7} textAnchor="middle"
                fill="var(--gold)" fontSize="6" fontFamily="sans-serif" dominantBaseline="middle">
                {item.name.length>14?item.name.slice(0,13)+"…":item.name}
              </text>}
            </g>
          );
        })}
      </svg>

      {/* Equipped list below */}
      <div style={{width:"100%",marginTop:8}}>
        {equipped.filter(s=>s.active).length===0?(
          <div style={{textAlign:"center",fontSize:".78rem",color:"var(--text4)",fontStyle:"italic"}}>No equipment slots filled yet.</div>
        ):(
          equipped.filter(s=>s.active).map(s=>(
            <div key={s.id} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:"1px solid var(--border)",fontSize:".8rem"}}>
              <span style={{color:"var(--text4)",fontFamily:"'Cinzel',serif",fontSize:".65rem",textTransform:"uppercase",letterSpacing:.5}}>{s.label}</span>
              <span style={{color:"var(--text2)"}}>{s.item?.name}</span>
            </div>
          ))
        )}
      </div>
    </div>
  );
}

// Spell slots display
function SpellsTab({char}){
  const isCaster=CASTER_CLASSES.includes(char.cls);
  const isWarlock=char.cls==="Warlock";
  const isHalf=HALF_CASTERS.includes(char.cls);
  const effectiveLv=isHalf?Math.floor(char.level/2):char.level;
  const slots=isWarlock?(WARLOCK_SLOTS[char.level]||WARLOCK_SLOTS[1]):(SPELL_SLOTS_BY_LEVEL[effectiveLv]||[]);

  if(!isCaster) return (
    <div style={{textAlign:"center",padding:"40px 20px"}}>
      <div style={{fontSize:"2rem",marginBottom:12}}>⚔️</div>
      <div style={{fontFamily:"'Cinzel',serif",color:"var(--text3)",fontSize:".9rem",marginBottom:6}}>{char.cls}s don't cast spells.</div>
      <div style={{color:"var(--text4)",fontSize:".8rem",lineHeight:1.6}}>Your power comes from training, rage, and steel — not the arcane.</div>
    </div>
  );

  const spellMod = char.cls==="Wizard"||char.cls==="Warlock"||char.cls==="Sorcerer"
    ? (char.cls==="Wizard"?"int":char.cls==="Warlock"||char.cls==="Sorcerer"?"cha":"wis")
    : ["Cleric","Druid","Ranger"].includes(char.cls)?"wis":"cha";
  const spellBonus = sm(char.stats[spellMod])+pb(char.level);
  const saveDC = 8+pb(char.level)+sm(char.stats[spellMod]);

  return (
    <div>
      {/* Spell stats */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:16}}>
        {[
          {label:"Spell Ability",val:SS[spellMod]},
          {label:"Spell Attack",val:fm(spellBonus)},
          {label:"Save DC",val:saveDC},
        ].map(s=>(
          <div key={s.label} style={{background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:8,padding:"10px 6px",textAlign:"center"}}>
            <div style={{fontSize:".55rem",color:"var(--text4)",textTransform:"uppercase",letterSpacing:.5,fontFamily:"'Cinzel',serif",marginBottom:4}}>{s.label}</div>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:"1.2rem",color:"var(--text2)",fontWeight:700}}>{s.val}</div>
          </div>
        ))}
      </div>

      {/* Spell slots */}

// The main swipeable character sheet
function CharacterSheet({char,flags,onExport,onSave}){
  const PAGES = ["Stats","Modifiers","Inventory","Spells","Backstory","Equipped"];
  const[page,setPage]=useState(0);
  const[dir,setDir]=useState(1);
  const touchStart=useRef(null);

  function go(delta){
    const next=Math.max(0,Math.min(PAGES.length-1,page+delta));
    if(next===page)return;
    setDir(delta>0?1:-1);
    setPage(next);
  }
  function onTS(e){touchStart.current=e.touches[0].clientX;}
  function onTE(e){if(touchStart.current===null)return;const d=touchStart.current-e.changedTouches[0].clientX;if(Math.abs(d)>40)go(d>0?1:-1);touchStart.current=null;}

  const profSkills = CLASS_PROFICIENCIES[char.cls]||[];
  const ac = char.equippedArmor
    ? parseInt(char.equippedArmor.ac)||10
    : 10+sm(char.stats.dex);

  return (
    <div>
      {/* Character identity header */}
      <div style={{marginBottom:14,paddingBottom:12,borderBottom:"1px solid var(--border)"}}>
        <div style={{fontFamily:"'Cinzel',serif",fontSize:"1.1rem",color:"var(--text2)"}}>{char.name}</div>
        <div style={{fontSize:".78rem",color:"var(--text3)",marginTop:2}}>Level {char.level} {char.race} {char.cls}</div>
        <div style={{fontSize:".72rem",color:"var(--text4)",marginTop:1}}>{char.background} · {char.xp||0} XP · {char.gold}gp</div>
      </div>

      {/* Page tabs */}
      <div style={{display:"flex",gap:0,marginBottom:14,overflowX:"auto",borderBottom:"1px solid var(--border)"}}>
        {PAGES.map((p,i)=>(
          <button key={p} onClick={()=>{setDir(i>page?1:-1);setPage(i);}}
            style={{flexShrink:0,padding:"6px 10px",background:"none",border:"none",
              borderBottom:`2px solid ${page===i?"var(--accent)":"transparent"}`,
              color:page===i?"var(--text2)":"var(--text4)",
              fontFamily:"'Cinzel',serif",fontSize:".62rem",cursor:"pointer",
              textTransform:"uppercase",letterSpacing:.5,transition:"all .15s",whiteSpace:"nowrap"}}>
            {p}
          </button>
        ))}
      </div>

      {/* Swipeable content */}
      <div onTouchStart={onTS} onTouchEnd={onTE}
        key={page} style={{animation:`slideCard .22s ease`,["--card-dir"]:dir>0?"30px":"-30px",minHeight:220}}>

        {/* ── STATS ── */}
        {page===0&&<div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:14}}>
            {SN.map(s=>(
              <div key={s} style={{background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:10,padding:"12px 8px",textAlign:"center"}}>
                <div style={{fontSize:".55rem",color:"var(--text4)",textTransform:"uppercase",fontFamily:"'Cinzel',serif",letterSpacing:.5,marginBottom:4}}>{SS[s]}</div>
                <div style={{fontFamily:"'Cinzel',serif",fontSize:"1.6rem",color:"var(--text)",fontWeight:900,lineHeight:1}}>{char.stats[s]}</div>
                <div style={{fontSize:".85rem",color:sm(char.stats[s])>=0?"#86efac":"#f87171",marginTop:3,fontWeight:700}}>{fm(sm(char.stats[s]))}</div>
              </div>
            ))}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
            {[
              {label:"Prof Bonus",val:fm(pb(char.level))},
              {label:"AC",val:ac},
              {label:"Initiative",val:fm(sm(char.stats.dex))},
              {label:"HP",val:`${char.hp}/${char.maxHp}`},
              {label:"Hit Die",val:`d${CLASSES.find(cl=>cl.name===char.cls)?.hitDie||8}`},
              {label:"Speed",val:"30 ft"},
            ].map(s=>(
              <div key={s.label} style={{background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:8,padding:"8px 6px",textAlign:"center"}}>
                <div style={{fontSize:".52rem",color:"var(--text4)",textTransform:"uppercase",fontFamily:"'Cinzel',serif",letterSpacing:.3,marginBottom:3}}>{s.label}</div>
                <div style={{fontFamily:"'Cinzel',serif",fontSize:"1rem",color:"var(--text2)",fontWeight:700}}>{s.val}</div>
              </div>
            ))}
          </div>
        </div>}

        {/* ── MODIFIERS / SKILLS ── */}
        {page===1&&<div>
          {/* Saving throws */}
          <div style={{marginBottom:14}}>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:".65rem",color:"var(--text4)",textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Saving Throws</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5}}>
              {SN.map(s=>{
                const cls=CLASSES.find(cl=>cl.name===char.cls);
                const isProficient=cls?.saves?.includes(s);
                const bonus=sm(char.stats[s])+(isProficient?pb(char.level):0);
                return (
                  <div key={s} style={{display:"flex",alignItems:"center",gap:6,padding:"5px 8px",background:"var(--bg3)",borderRadius:6,border:"1px solid var(--border)"}}>
                    <div style={{width:16,height:16,borderRadius:"50%",background:isProficient?"var(--maroon)":"transparent",border:`1.5px solid ${isProficient?"var(--gold)":"var(--border2)"}`,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
                      {isProficient&&<div style={{width:6,height:6,borderRadius:"50%",background:"#fff"}}/>}
                    </div>
                    <span style={{fontSize:".75rem",color:"var(--text3)",flex:1}}>{SL[s].slice(0,3)}</span>
                    <span style={{fontFamily:"'Cinzel',serif",fontSize:".85rem",color:bonus>=0?"#86efac":"#f87171",fontWeight:700}}>{fm(bonus)}</span>
                  </div>
                );
              })}
            </div>
          </div>
          {/* Skills */}
          <div style={{fontFamily:"'Cinzel',serif",fontSize:".65rem",color:"var(--text4)",textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Skills</div>
          <div style={{display:"flex",flexDirection:"column",gap:4}}>
            {SKILLS_ORDERED.map(sk=>{
              const isProficient=profSkills.includes(sk.name);
              const bonus=sm(char.stats[sk.stat])+(isProficient?pb(char.level):0);
              return (
                <div key={sk.name} style={{display:"flex",alignItems:"center",gap:8,padding:"4px 8px",borderRadius:5,background:isProficient?"var(--bg3)":"transparent",border:`1px solid ${isProficient?"var(--border)":"transparent"}`}}>
                  <div style={{width:12,height:12,borderRadius:"50%",background:isProficient?"var(--maroon)":"transparent",border:`1.5px solid ${isProficient?"var(--gold)":"var(--border2)"}`,flexShrink:0}}/>
                  <span style={{flex:1,fontSize:".8rem",color:isProficient?"var(--text2)":"var(--text3)"}}>{sk.name}</span>
                  <span style={{fontSize:".62rem",color:"var(--text4)",width:28}}>{SS[sk.stat]}</span>
                  <span style={{fontFamily:"'Cinzel',serif",fontSize:".85rem",color:bonus>=0?"#86efac":"#f87171",fontWeight:700,width:28,textAlign:"right"}}>{fm(bonus)}</span>
                </div>
              );
            })}
          </div>
        </div>}

        {/* ── INVENTORY ── */}
        {page===2&&<div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <span style={{fontFamily:"'Cinzel',serif",fontSize:".65rem",color:"var(--text4)",textTransform:"uppercase",letterSpacing:1}}>{char.inventory?.length||0} items</span>
            <span style={{fontFamily:"'Cinzel',serif",fontSize:".72rem",color:"#fbbf24"}}>◎ {char.gold} gp</span>
          </div>
          {(char.inventory||[]).length===0?(
            <div style={{textAlign:"center",color:"var(--text4)",fontSize:".8rem",fontStyle:"italic",padding:"30px 0"}}>No items yet.</div>
          ):(
            (char.inventory||[]).map((item,i)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 10px",background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:8,marginBottom:6}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:".9rem",color:"var(--text2)"}}>{item.name}</div>
                  {item.desc&&<div style={{fontSize:".72rem",color:"var(--text4)",marginTop:2}}>{item.desc}</div>}
                </div>
                <div style={{fontFamily:"'Cinzel',serif",fontSize:".8rem",color:"var(--text4)",flexShrink:0,marginLeft:8}}>×{item.qty||1}</div>
              </div>
            ))
          )}
        </div>}

        {/* ── SPELLS ── */}
        {page===3&&<SpellsTab char={char}/>}

        {/* ── BACKSTORY ── */}
        {page===4&&<div>
          <div style={{fontSize:".95rem",color:"var(--text2)",lineHeight:1.8,marginBottom:16,whiteSpace:"pre-wrap"}}>
            {char.backstory||<span style={{color:"var(--text4)",fontStyle:"italic"}}>No backstory written yet.</span>}
          </div>
          {(flags?.legacy||[]).length>0&&(
            <div>
              <div style={{fontFamily:"'Cinzel',serif",fontSize:".65rem",color:"var(--text4)",textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Legacy</div>
              <div style={{display:"flex",flexDirection:"column",gap:5}}>
                {(flags.legacy||[]).map((f,i)=>(
                  <div key={i} style={{background:"#1a0800",border:"1px solid #7c3aed44",borderRadius:6,padding:"6px 10px",fontSize:".82rem",color:"var(--silver2)"}}>★ {f}</div>
                ))}
              </div>
            </div>
          )}
        </div>}

        {/* ── EQUIPPED / SILHOUETTE ── */}
        {page===5&&<Silhouette char={char}/>}
      </div>

      {/* Export / Save */}
      <div style={{display:"flex",gap:8,marginTop:18,paddingTop:12,borderTop:"1px solid var(--border)"}}>
        <Btn variant="outline" size="sm" onClick={onExport} style={{flex:1}}>⬇ Export</Btn>
        <Btn variant="ghost"   size="sm" onClick={onSave}   style={{flex:1}}>💾 Save</Btn>
      </div>
    </div>
  );
}

// ═══════════════════ GAME SCREEN ═══════════════════

const WW=10,TT=5000;

function GameScreen({character:ic,scenario,settings:is,completedIds,apiKey,restoreData,onReturnToMenu}){
  const rd=restoreData||{};
  const[char,setChar]=useState(ic);
  const[settings,setSettings]=useState(is);
  const[msgs,setMsgs]=useState(rd.msgs||[]);
  const[disp,setDisp]=useState(rd.disp||[]);
  const[input,setInput]=useState("");
  const[loading,setLoading]=useState(false);
  const[suggesting,setSuggesting]=useState(false);
  const[rightMenuOpen,setRightMenuOpen]=useState(false);
  const[rightTab,setRightTab]=useState("char");
  const[journalOpen,setJournalOpen]=useState(false);
  const[summary,setSummary]=useState(rd.summary||"");
  const[flags,setFlags]=useState(rd.flags||{legacy:[],npcs:{},quests:[]});
  const[tokEst,setTokEst]=useState(0);
  const[compressing,setCompressing]=useState(false);
  const[rollReq,setRollReq]=useState(null);
  const[rollCb,setRollCb]=useState(null);
  const[showTray,setShowTray]=useState(false);
  const[combat,dispRaw]=useReducer(combatR,rd.combat||{active:false,combatants:[],round:1,turnIdx:0,log:[]});
  const[hpI,setHpI]=useState({});
  const isRestored=!!(rd.msgs?.length);
  const endRef=useRef(null);
  const saveTimerRef=useRef(null);
  const dispatch=useCallback(a=>dispRaw(a),[]);
  const gs={character:char,scenario,summary,flags,scenarioId:scenario?.id};

  useEffect(()=>{endRef.current?.scrollIntoView({behavior:"smooth"});},[disp]);

  // Skip intro if restoring from save — messages already in state
  useEffect(()=>{
    if(isRestored){
      // Just scroll to bottom; toast a restore notice
      setTimeout(()=>endRef.current?.scrollIntoView({behavior:"smooth"}),100);
      return;
    }
    const intro=scenario?scenario.lore:"You stand at the edge of the known world. The Open World stretches before you. What do you do?";
    setDisp([{role:"dm",text:intro}]);
    if(scenario?.isColiseum){
      const{arena,tier,party}=scenario;
      const arenaDesc=arena.id==="random"?"Choose a dramatic arena of your own invention and describe it":("Set the "+arena.name+" scene ("+arena.desc+")");
      const weaponStr=scenario.weapon?(" The player is armed with "+scenario.weapon.name+" ("+scenario.weapon.dmg+" "+scenario.weapon.type+") and wearing "+scenario.armor?.name+" (AC "+scenario.armor?.ac+")."):"";
      const prime="[COLISEUM] "+arenaDesc+" in 2 vivid sentences."+weaponStr+" Then immediately output [COMBAT: Name|HP/AC, Name|HP/AC] spawning 2-4 level-"+ic.level+"-appropriate "+tier.label+"-tier enemies ("+tier.desc+"). Party: "+party.label+" ("+party.desc+"). No XP. Pure combat. Begin now.";
      setTimeout(()=>send(prime,{silent:true}),600);
    }
  },[]);
  useEffect(()=>{
    const est=msgs.reduce((a,m)=>a+Math.ceil(m.content.length/4)*(m.role==="assistant"?1.2:1),0);
    setTokEst(Math.round(est));
    if(est>TT&&!compressing&&msgs.length>WW*2)comp();
  },[msgs]);

  // ─── AUTO-SAVE ────────────────────────────────────────────────────────────
  // Build the current save payload (uses refs so always fresh in event handlers)
  const stateRef=useRef({});
  stateRef.current={char,msgs,disp,summary,flags,settings,combat,completedIds,scenario,apiKey};

  function doSave(label=""){
    try{
      const s=stateRef.current;
      const payload={
        char:s.char, scenario:s.scenario, summary:s.summary,
        flags:s.flags, settings:s.settings, completedIds:s.completedIds,
        apiKey:s.apiKey,
        msgs:s.msgs,
        // Only save last 60 display messages to keep storage lean
        disp:s.disp.slice(-60),
        // Save combat state so mid-fight close/resume works
        combat:s.combat.active?s.combat:{active:false,combatants:[],round:1,turnIdx:0,log:[]},
        savedAt:Date.now(),
      };
      localStorage.setItem(SAVE_KEY, JSON.stringify(payload));
      localStorage.setItem(SAVE_KEY+"_notes", localStorage.getItem(SAVE_KEY+"_notes")||"");
    }catch(e){ console.warn("Auto-save failed",e); }
  }

  // Debounced auto-save on every meaningful state change
  useEffect(()=>{
    if(msgs.length===0&&disp.length<=1) return; // skip before game starts
    clearTimeout(saveTimerRef.current);
    saveTimerRef.current=setTimeout(()=>doSave("auto"),800);
    return()=>clearTimeout(saveTimerRef.current);
  },[msgs,char,flags,summary,combat.round,combat.turnIdx]);

  // Immediate save when page hides (tab switch, app backgrounded, browser close)
  useEffect(()=>{
    function onHide(){ if(document.visibilityState==="hidden") doSave("hide"); }
    function onUnload(){ doSave("unload"); }
    document.addEventListener("visibilitychange",onHide);
    window.addEventListener("beforeunload",onUnload);
    return()=>{
      document.removeEventListener("visibilitychange",onHide);
      window.removeEventListener("beforeunload",onUnload);
    };
  },[]);
  // ─── END AUTO-SAVE ────────────────────────────────────────────────────────

  async function comp(){
    if(compressing||!apiKey)return;setCompressing(true);
    const old=msgs.slice(0,msgs.length-WW),keep=msgs.slice(msgs.length-WW);
    const ns=await compressMem(apiKey,old,summary,char.name);
    setSummary(ns);setMsgs(keep);setCompressing(false);
    add({role:"system",text:"[ Memory compressed ]",type:"system"});
  }
  function add(msg){setDisp(d=>[...d,msg]);}

  async function send(text,opts={}){
    if(!text.trim()||loading)return;
    if(!apiKey){add({role:"system",text:"No API key — go to Settings.",type:"error"});return;}
    const{silent=false}=opts;
    setInput("");
    if(!silent)add({role:"user",text});
    const nm=[...msgs,{role:"user",content:text}];setMsgs(nm);setLoading(true);
    try{
      const reply=await callClaude(apiKey,buildSys(gs,settings),nm);
      const{clean,rolls,enemies,milestone,xp,gold,items,quests}=parseDM(reply);
      setMsgs(m=>[...m,{role:"assistant",content:reply}]);
      add({role:"dm",text:clean});
      if(xp||gold||items.length){setChar(c=>({...c,xp:(c.xp||0)+xp,gold:c.gold+gold,level:xlv((c.xp||0)+xp),inventory:[...c.inventory,...items.map(n=>({name:n,qty:1}))]}));if(xp)add({role:"system",text:`+${xp} XP${gold?` · +${gold}gp`:""}${items.length?` · Found: ${items.join(", ")}`:""}`  ,type:"reward"});}
      if(milestone){setFlags(f=>({...f,legacy:[...f.legacy,milestone]}));add({role:"system",text:`★ Milestone: ${milestone}`,type:"milestone"});}
      if(quests.length){setFlags(f=>({...f,quests:[...(f.quests||[]),...quests.map(n=>({name:n,status:"active",added:Date.now()}))]}));quests.forEach(q=>add({role:"system",text:`📜 Quest added: ${q}`,type:"quest"}));}
      if(Object.keys(npcs).length){setFlags(f=>({...f,npcs:{...(f.npcs||{}),...npcs}}));Object.entries(npcs).forEach(([n,d])=>add({role:"system",text:`👤 ${n} — ${d}`,type:"npc"}));}
      if(enemies)dispatch({type:"START",enemies,char});
      if(rolls.length>0)qRoll(rolls[0]);
    }catch(e){add({role:"system",text:`[ Error: ${e.message} ]`,type:"error"});}
    setLoading(false);
  }

  async function suggest(){
    if(!apiKey||loading)return;setSuggesting(true);
    const hist=disp.filter(m=>m.role==="dm").slice(-4).map(m=>m.text).join("\n");
    const p=`D&D scene:\n${hist}\n\nSuggest 4 short player actions (max 8 words each). JSON array only, no markdown, no backticks.`;
    try{const raw=await callClaude(apiKey,"D&D action suggester. Output only a JSON array.",[{role:"user",content:p}],200);const arr=JSON.parse(raw.replace(/```[a-z]*|```/g,"").trim());if(Array.isArray(arr))add({role:"system",text:"__SUGG__:"+JSON.stringify(arr),type:"suggestions"});}
    catch{}setSuggesting(false);
  }

  function qRoll(r){
    const mods=[],rl=r.reason.toLowerCase();
    const sk=Object.keys(SKM).find(k=>rl.includes(k.toLowerCase()));
    if(sk){const st=SKM[sk];mods.push({label:SL[st],value:sm(char.stats[st])},{label:"Prof",value:pb(char.level)});}
    else{const sn=SN.find(s=>rl.includes(s)||rl.includes(SL[s].toLowerCase().slice(0,4)));if(sn)mods.push({label:SL[sn],value:sm(char.stats[sn])});}
    setRollReq({sides:r.sides,count:1,modifiers:mods,label:r.reason+(r.dc?` (DC ${r.dc})`:"")+( r.adv?" [Adv]":r.dis?" [Dis]":""),adv:r.adv,dis:r.dis,dc:r.dc});
  }

  function onRollDone(vals,total,dr,isCrit,isFumble){
    const dc=rollReq?.dc,success=dc?total>=dc:null;
    const txt=[`Rolled ${vals.join("+")}`,rollReq?.modifiers?.length?`(+mods) = ${total}`:total.toString(),dc?(success?`✓ DC ${dc}`:`✗ DC ${dc}`):"",isCrit?"CRITICAL!":isFumble?"Fumble.":""].filter(Boolean).join(" · ");
    add({role:"system",text:txt,type:"roll"});setRollReq(null);
    if(rollCb){rollCb(total,isCrit);setRollCb(null);}
    else send(`[ROLL RESULT: ${total}${isCrit?" — critical hit!":isFumble?" — fumble.":""}${dc?success?" Success.":" Failure.":""}]`);
  }

  function saveG(){doSave("manual");add({role:"system",text:"[ Saved ]",type:"system"});setRightMenuOpen(false);}

  function shortRest(){
    const cls=CLASSES.find(cl=>cl.name===char.cls);
    const hd=cls?.hitDie||8;
    const heal=rd(hd)+sm(char.stats.con);
    const newHp=Math.min(char.maxHp,char.hp+Math.max(1,heal));
    setChar(ch=>({...ch,hp:newHp}));
    // Warlocks recover spell slots on short rest
    if(char.cls==="Warlock"){
      setSpellSlots(s=>({...s,pact:{...s.pact,used:0}}));
    }
    add({role:"system",text:`Short Rest — recovered ${newHp-char.hp} HP (1d${hd}+${sm(char.stats.con)}). ${char.cls==="Warlock"?"Pact slots restored.":""}`,type:"reward"});
    send("[SHORT REST taken. Narrate a brief rest scene, then await the next player action.]",{silent:true});
  }

  function longRest(){
    const newHp=char.maxHp;
    setChar(ch=>({...ch,hp:newHp}));
    // Restore all spell slots
    setSpellSlots(s=>{
      const reset={};
      Object.entries(s).forEach(([k,v])=>{reset[k]={...v,used:0};});
      return reset;
    });
    add({role:"system",text:`Long Rest — HP fully restored (${newHp}/${newHp}). All spell slots recovered.`,type:"reward"});
    send("[LONG REST taken. Narrate a full rest — camp, dreams, dawn. Then continue the adventure.]",{silent:true});
  }

  const hpPct=char.hp/char.maxHp,hpCol=hpPct<=.25?"#ef4444":hpPct<=.5?"#f59e0b":"#22c55e";
  const[saveFlash,setSaveFlash]=useState(false);
  // Flash the save indicator briefly after any auto-save
  useEffect(()=>{
    if(msgs.length===0&&disp.length<=1)return;
    setSaveFlash(true);
    const t=setTimeout(()=>setSaveFlash(false),1500);
    return()=>clearTimeout(t);
  },[msgs.length]);
  const curC=combat.combatants[combat.turnIdx],isPlayerTurn=combat.active&&curC?.isPlayer;
  const activeQCount=(flags.quests||[]).filter(q=>q.status==="active").length;
  const[aarPending,setAarPending]=useState(false);

  // Spell slot tracking state
  const[spellSlots,setSpellSlots]=useState({});
  const[spellsOpen,setSpellsOpen]=useState(false);

  // Initialize spell slots when character loads or levels up
  useEffect(()=>{
    const slots={};
    const isCaster=CASTER_CLASSES.includes(char.cls);
    if(!isCaster)return;
    const isWarlock=char.cls==="Warlock";
    const isHalf=HALF_CASTERS.includes(char.cls);
    const lv=isHalf?Math.floor(char.level/2):char.level;
    const raw=isWarlock?(WARLOCK_SLOTS[char.level]||WARLOCK_SLOTS[1]):SPELL_SLOTS_BY_LEVEL[lv]||[];
    if(isWarlock){slots.pact={max:raw[0],used:0,level:raw[1]};}
    else{raw.forEach((n,i)=>{slots[i+1]={max:n,used:0};});}
    setSpellSlots(prev=>{
      // Don't reset if already set (preserve used count)
      if(Object.keys(prev).length===Object.keys(slots).length)return prev;
      return slots;
    });
  },[char.level,char.cls]);

  // Level up detection
  const[levelUpPending,setLevelUpPending]=useState(null);
  useEffect(()=>{
    const newLv=xlv(char.xp||0);
    if(newLv>char.level){
      const cls=CLASSES.find(cl=>cl.name===char.cls);
      const conMod=sm(char.stats.con);
      const hpGain=Math.floor((cls?.hitDie||8)/2)+1+conMod;
      setChar(ch=>({...ch,level:newLv,maxHp:ch.maxHp+hpGain,hp:ch.hp+hpGain}));
      setLevelUpPending({level:newLv,hpGain,profBonus:pb(newLv)});
    }
  },[char.xp]);

  // Detect when ALL enemies are down — trigger AAR if coliseum, or victory message
  useEffect(()=>{
    if(!combat.active)return;
    const enemies=combat.combatants.filter(cb=>!cb.isAlly&&!cb.isPlayer);
    const allDown=enemies.length>0&&enemies.every(cb=>cb.hp<=0);
    if(allDown){
      if(scenario?.isColiseum&&!aarPending){
        setAarPending(true);
        dispatch({type:"END"});
        setTimeout(()=>{
          add({role:"system",text:"⚔ All enemies defeated! Victory!",type:"milestone"});
          add({role:"system",text:"__AAR__",type:"aar"});
        },600);
      } else if(!aarPending){
        setAarPending(true);
        dispatch({type:"END"});
        setTimeout(()=>{
          add({role:"system",text:"⚔ Victory! All enemies defeated.",type:"milestone"});
          send("[COMBAT ENDED: player side won. Continue the narrative.]",{silent:true});
        },600);
      }
    }
  },[combat.combatants]);

  // Automated enemy + ally turns
  const autoTurnRef=useRef(false);
  useEffect(()=>{
    if(!combat.active)return;
    const cur=combat.combatants[combat.turnIdx];
    if(!cur||cur.hp<=0){
      // Skip dead combatants
      if(combat.active)setTimeout(()=>dispatch({type:"NEXT_TURN"}),300);
      return;
    }
    if(cur.isPlayer)return; // player's turn — wait for input

    // Auto-resolve NPC turns (allies and enemies)
    if(autoTurnRef.current)return;
    autoTurnRef.current=true;

    setTimeout(()=>{
      const state=combat; // capture
      const combatants=state.combatants;
      const isEnemy=!cur.isAlly&&!cur.isPlayer;
      const isAlly=cur.isAlly;

      let targets=[];
      if(isEnemy){
        // Enemy targets: player + allies (living)
        targets=combatants.filter(cb=>(cb.isPlayer||cb.isAlly)&&cb.hp>0);
      } else if(isAlly){
        // Ally targets: enemies (living)
        targets=combatants.filter(cb=>!cb.isPlayer&&!cb.isAlly&&cb.hp>0);
      }

      if(targets.length===0){
        autoTurnRef.current=false;
        dispatch({type:"NEXT_TURN"});
        return;
      }

      // Target the lowest HP combatant
      const target=targets.reduce((a,b)=>a.hp<b.hp?a:b);

      // Simple attack: d20 + 3 to hit, d6+2 damage (NPC baseline)
      const atkRoll=rd(20)+3;
      const hit=atkRoll>=target.ac;
      const crit=atkRoll===20;
      const dmg=hit?rd(crit?12:6)+2:0;

      let logMsg="";
      if(hit){
        dispatch({type:"HP",id:target.id,delta:-dmg});
        logMsg=`${cur.name} hits ${target.name} for ${dmg}${crit?" (CRIT!)":""}`;
        add({role:"system",text:logMsg,type:"combat"});
        // Update player HP display
        if(target.isPlayer){
          setChar(ch=>({...ch,hp:Math.max(0,ch.hp-dmg)}));
        }
      } else {
        logMsg=`${cur.name} misses ${target.name}`;
        add({role:"system",text:logMsg,type:"combat"});
      }

      dispatch({type:"ADD_LOG",text:logMsg});
      autoTurnRef.current=false;
      setTimeout(()=>dispatch({type:"NEXT_TURN"}),600);
    },900);
  },[combat.turnIdx,combat.active]);

  return <div style={{height:"100vh",background:"var(--bg)",display:"flex",flexDirection:"column",overflow:"hidden"}}>

    {/* TOP BAR */}
    <div style={{background:"var(--bg2)",borderBottom:"1px solid var(--border)",padding:"10px 12px",display:"flex",alignItems:"center",gap:10,flexShrink:0,zIndex:20,paddingTop:`calc(10px + env(safe-area-inset-top))`}}>
      {/* Journal button */}
      <button onClick={()=>setJournalOpen(true)} style={{background:"none",border:"1px solid var(--border2)",borderRadius:8,padding:"6px 10px",color:"#fbbf24",cursor:"pointer",fontSize:".85rem",fontFamily:"'Cinzel',serif",display:"flex",alignItems:"center",gap:5,flexShrink:0,position:"relative"}}>
        📜
        {activeQCount>0&&<span style={{position:"absolute",top:-4,right:-4,background:"var(--maroon)",color:"#fff",borderRadius:"50%",width:14,height:14,fontSize:".55rem",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Cinzel',serif"}}>{activeQCount}</span>}
      </button>

      {/* Center: char info */}
      <div style={{flex:1,textAlign:"center"}}>
        <div style={{fontFamily:"'Cinzel',serif",fontSize:".85rem",color:"var(--text2)",lineHeight:1}}>{char.name}</div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,marginTop:3}}>
          <div style={{width:52,height:4,background:"var(--border)",borderRadius:2}}><div style={{height:"100%",width:`${hpPct*100}%`,background:hpCol,borderRadius:2,transition:"width .3s"}}/></div>
          <span style={{fontSize:".68rem",color:hpCol,fontFamily:"'Cinzel',serif",flexShrink:0}}>{char.hp}/{char.maxHp}</span>
          <div title="Auto-saved" style={{width:5,height:5,borderRadius:"50%",background:saveFlash?"#86efac":"var(--border2)",transition:"background .4s",flexShrink:0}}/>
        </div>
      </div>

      {/* Right: hamburger */}
      <button onClick={()=>setRightMenuOpen(m=>!m)} style={{background:"none",border:"1px solid var(--border2)",borderRadius:8,padding:"6px 10px",color:"var(--text3)",cursor:"pointer",fontSize:"1.1rem",flexShrink:0}}>☰</button>
    </div>

    {/* COMBAT */}
    {combat.active&&<div style={{background:"#0a0c18",borderBottom:"1px solid #7f1d1d44",padding:"8px 12px",flexShrink:0}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <span style={{fontFamily:"'Cinzel',serif",color:"#ef4444",fontSize:".68rem",letterSpacing:2}}>⚔ COMBAT — Round {combat.round}</span>
        <div style={{display:"flex",gap:6}}>{isPlayerTurn&&<Btn size="sm" onClick={()=>dispatch({type:"NEXT_TURN"})}>End Turn</Btn>}<Btn size="sm" variant="danger" onClick={()=>dispatch({type:"END"})}>End</Btn></div>
      </div>
      <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:4}}>
        {combat.combatants.map((c,i)=>{const isCur=i===combat.turnIdx;return(
          <div key={c.id} style={{flexShrink:0,minWidth:70,background:isCur?(c.isPlayer?"#1a1200":"#3b0a0a"):"var(--bg3)",border:`1px solid ${isCur?(c.isPlayer?"var(--gold)":"#dc2626"):"var(--border)"}`,borderRadius:8,padding:"6px 8px",textAlign:"center",opacity:c.hp<=0?.4:1}}>
            <div style={{fontSize:".58rem",color:"var(--text4)"}}>{c.initiative}</div>
            <div style={{fontSize:".72rem",color:c.isPlayer?"#a5b4fc":"#fca5a5",fontFamily:"'Cinzel',serif",lineHeight:1.2}}>{c.name}</div>
            <HPBar hp={c.hp} maxHp={c.maxHp} height={3}/>
            <div style={{fontSize:".58rem",color:"var(--text4)",marginTop:2}}>{c.hp<=0?"💀":`${c.hp}/${c.maxHp}`}</div>
            <div style={{display:"flex",gap:2,justifyContent:"center",marginTop:4}}>
              <button onClick={()=>{const v=parseInt(hpI[c.id]||1);dispatch({type:"HP",id:c.id,delta:-v});}} style={{width:18,height:18,background:"#7f1d1d44",border:"1px solid #7f1d1d",borderRadius:3,color:"#ef4444",cursor:"pointer",fontSize:".88rem",lineHeight:1}}>-</button>
              <input type="number" value={hpI[c.id]||""} onChange={e=>setHpI(h=>({...h,[c.id]:e.target.value}))} placeholder="?" style={{width:22,background:"var(--bg3)",border:"none",borderRadius:3,color:"var(--text)",textAlign:"center",fontSize:".62rem",padding:"1px"}}/>
              <button onClick={()=>{const v=parseInt(hpI[c.id]||1);dispatch({type:"HP",id:c.id,delta:v});}} style={{width:18,height:18,background:"#14532d44",border:"1px solid #14532d",borderRadius:3,color:"#86efac",cursor:"pointer",fontSize:".88rem",lineHeight:1}}>+</button>
            </div>
            {isPlayerTurn&&!c.isPlayer&&c.hp>0&&<button onClick={()=>{setRollReq({sides:20,count:1,modifiers:[{label:"STR",value:sm(char.stats.str)},{label:"Prof",value:pb(char.level)}],label:`Attack ${c.name} (AC ${c.ac})`,adv:false,dis:false});setRollCb(()=>(tot,isCrit)=>{if(tot>=c.ac||isCrit){setRollReq({sides:8,count:isCrit?2:1,modifiers:[{label:"STR",value:sm(char.stats.str)}],label:`Damage${isCrit?" (CRIT)":""}`,adv:false,dis:false});setRollCb(()=>dmg=>{dispatch({type:"HP",id:c.id,delta:-dmg});add({role:"system",text:`Hit ${c.name} for ${dmg}!${isCrit?" CRIT!":""}`,type:"combat"});});}else{add({role:"system",text:`Missed ${c.name}.`,type:"combat"});}});}} style={{marginTop:4,background:"var(--accent2)",border:"none",borderRadius:4,color:"#fff",fontSize:".58rem",padding:"2px 5px",cursor:"pointer",fontFamily:"'Cinzel',serif",width:"100%"}}>Attack</button>}
            {c.isPlayer&&c.hp<=0&&<div style={{marginTop:4}}>
              <div style={{display:"flex",gap:2,justifyContent:"center"}}>{[0,1,2].map(i=><div key={i} style={{width:6,height:6,borderRadius:"50%",background:(c.deathSaves?.s||0)>i?"#86efac":"var(--border)",border:"1px solid var(--border2)"}}/>)}</div>
              <div style={{display:"flex",gap:2,justifyContent:"center",marginTop:2}}>{[0,1,2].map(i=><div key={i} style={{width:6,height:6,borderRadius:"50%",background:(c.deathSaves?.f||0)>i?"#ef4444":"var(--border)",border:"1px solid var(--border2)"}}/>)}</div>
              <button onClick={()=>{setRollReq({sides:20,count:1,modifiers:[],label:"Death Save",adv:false,dis:false});setRollCb(()=>tot=>dispatch({type:"DEATH_SAVE",success:tot>=10}));}} style={{marginTop:3,background:"#7f1d1d",border:"none",borderRadius:4,color:"#fca5a5",fontSize:".55rem",padding:"2px 4px",cursor:"pointer",fontFamily:"'Cinzel',serif",width:"100%"}}>Death Save</button>
            </div>}
          </div>
        );})}
      </div>
    </div>}

    {/* MESSAGES */}
    <div style={{flex:1,overflowY:"auto",overflowX:"hidden",WebkitOverflowScrolling:"touch",padding:"12px 14px",display:"flex",flexDirection:"column",gap:10}}>
      {disp.map((m,i)=>{
        if(m.type==="aar"){return(
          <div key={i} style={{animation:"fadeUp .3s ease",background:"#1a0800",border:"1px solid #7c3aed",borderRadius:12,padding:"14px 16px"}}>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:".78rem",color:"var(--silver2)",marginBottom:10}}>The fight is over. What would you like?</div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              <button onClick={()=>{setAarPending(false);send("Give me a coaching breakdown of that fight — what I did well, what I could improve, and key tactical mistakes.",{silent:true});}} style={{background:"var(--bg3)",border:"1px solid var(--border2)",borderRadius:8,padding:"9px 12px",color:"var(--text2)",fontSize:".9rem",cursor:"pointer",textAlign:"left",fontFamily:"inherit"}}>🎯 Coaching — what did I do well and what could I improve?</button>
              <button onClick={()=>{setAarPending(false);send("Give me a full after action review of that fight — a play-by-play of what happened, key turning points, and lessons learned.",{silent:true});}} style={{background:"var(--bg3)",border:"1px solid var(--border2)",borderRadius:8,padding:"9px 12px",color:"var(--text2)",fontSize:".9rem",cursor:"pointer",textAlign:"left",fontFamily:"inherit"}}>📋 Full After Action Review</button>
              <button onClick={()=>{setAarPending(false);add({role:"system",text:"[ Continuing... ]",type:"system"});}} style={{background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:8,padding:"9px 12px",color:"var(--text4)",fontSize:".9rem",cursor:"pointer",textAlign:"left",fontFamily:"inherit"}}>→ Skip — fight another round</button>
            </div>
          </div>
        );}
        if(m.type==="suggestions"){
          try{const suggs=JSON.parse(m.text.replace("__SUGG__:",""));return(
            <div key={i} style={{animation:"fadeUp .3s ease"}}>
              <div style={{fontSize:".6rem",color:"var(--text4)",marginBottom:6,textTransform:"uppercase",letterSpacing:1,fontFamily:"'Cinzel',serif"}}>Suggested Actions</div>
              <div style={{display:"flex",flexDirection:"column",gap:6}}>{suggs.map((s,j)=><button key={j} onClick={()=>send(s)} style={{background:"var(--bg3)",border:"1px solid var(--border2)",borderRadius:8,padding:"9px 12px",color:"#a5b4fc",fontSize:".9rem",cursor:"pointer",textAlign:"left",fontFamily:"inherit"}}>{s}</button>)}</div>
            </div>);}catch{return null;}
        }
        if(m.role==="system"||["roll","milestone","reward","combat","error","quest","system"].includes(m.type)){
          const col=m.type==="milestone"?"#fbbf24":m.type==="roll"?"#a5b4fc":m.type==="reward"?"#86efac":m.type==="combat"?"#fca5a5":m.type==="quest"?"#34d399":m.type==="npc"?"#93c5fd":m.type==="error"?"#ef4444":"var(--text4)";
          return <div key={i} style={{textAlign:"center",fontSize:".72rem",color:col,padding:"2px 0",fontFamily:"'Cinzel',serif",letterSpacing:.5,animation:"fadeIn .3s ease"}}>{m.text}</div>;
        }
        return <div key={i} style={{alignSelf:m.role==="user"?"flex-end":"flex-start",maxWidth:"88%",animation:"fadeUp .3s ease"}}>
          {m.role==="dm"&&<div style={{fontSize:".55rem",color:"var(--text4)",marginBottom:3,textTransform:"uppercase",letterSpacing:1,fontFamily:"'Cinzel',serif"}}>Dungeon Master</div>}
          <div style={{background:m.role==="user"?"var(--maroon)":"var(--bg3)",border:`1px solid ${m.role==="user"?"var(--accent2)":"var(--border2)"}`,borderRadius:m.role==="user"?"14px 14px 4px 14px":"4px 14px 14px 14px",padding:"11px 14px",lineHeight:1.78,color:"var(--text)"}}>{m.text}</div>
        </div>;
      })}
      {loading&&<div style={{alignSelf:"flex-start",color:"var(--text4)",fontSize:".82rem",fontStyle:"italic",animation:"pulse 1.5s ease infinite"}}>The DM ponders...</div>}
      <div ref={endRef}/>
    </div>

    {/* INPUT AREA */}
    <div style={{padding:"8px 12px",background:"var(--bg2)",borderTop:"1px solid var(--border)",flexShrink:0,paddingBottom:`calc(8px + env(safe-area-inset-bottom))`}}>
      {showTray&&<div style={{background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:12,padding:12,marginBottom:10,animation:"slideUp .2s ease"}}>
        <div style={{fontSize:".6rem",color:"var(--text4)",textTransform:"uppercase",letterSpacing:1,fontFamily:"'Cinzel',serif",marginBottom:8}}>Quick Roll</div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>{[4,6,8,10,12,20,100].map(d=><button key={d} onClick={()=>{setRollReq({sides:d,count:1,modifiers:[],label:`d${d} Roll`,adv:false,dis:false});setShowTray(false);}} style={{padding:"6px 10px",borderRadius:8,border:"none",background:`${DC[d]}22`,color:DC[d],cursor:"pointer",fontSize:".82rem",fontFamily:"'Cinzel',serif"}}>d{d}</button>)}</div>
        <div style={{fontSize:".6rem",color:"var(--text4)",textTransform:"uppercase",letterSpacing:1,fontFamily:"'Cinzel',serif",marginBottom:6}}>Skills</div>
        <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{Object.keys(SKM).map(sk=><button key={sk} onClick={()=>{const st=SKM[sk];setRollReq({sides:20,count:1,modifiers:[{label:SL[st],value:sm(char.stats[st])},{label:"Prof",value:pb(char.level)}],label:`${sk} Check`,adv:false,dis:false});setShowTray(false);}} style={{padding:"3px 8px",borderRadius:5,border:"1px solid var(--border)",background:"var(--bg2)",color:"var(--text3)",cursor:"pointer",fontSize:".62rem",fontFamily:"'Cinzel',serif",textTransform:"capitalize"}}>{sk}</button>)}</div>
      </div>}
      <button onClick={suggest} disabled={suggesting||loading} style={{width:"100%",background:"var(--bg3)",border:"1px solid var(--border2)",borderRadius:8,padding:"7px 12px",color:suggesting?"var(--text4)":"var(--text3)",fontSize:".72rem",cursor:suggesting?"not-allowed":"pointer",marginBottom:8,fontFamily:"'Cinzel',serif",textTransform:"uppercase",letterSpacing:1,textAlign:"center",transition:"all .2s"}}>
        {suggesting?"Thinking...":"✦ Suggest an Action"}
      </button>
      <div style={{display:"flex",gap:8}}>
        <button onClick={()=>setShowTray(t=>!t)} style={{background:showTray?"#1a1200":"none",border:"1px solid var(--border2)",borderRadius:10,color:"var(--text3)",fontSize:"1rem",padding:"0 12px",cursor:"pointer",flexShrink:0}}>⚄</button>
        <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send(input);}}} placeholder="What do you do?" style={{flex:1,background:"var(--bg3)",border:"1px solid var(--border2)",borderRadius:10,padding:"10px 14px",color:"var(--text)",fontSize:".95rem",fontFamily:"'Crimson Text',serif"}}/>
        <button onClick={()=>send(input)} disabled={loading} style={{background:loading?"var(--bg3)":"var(--accent2)",border:"none",borderRadius:10,padding:"10px 16px",color:"#fff",fontSize:"1.05rem",cursor:loading?"not-allowed":"pointer",flexShrink:0,transition:"background .2s"}}>▶</button>
      </div>
    </div>

    {/* LEVEL UP MODAL */}
    {levelUpPending&&<div className="overlay" style={{display:"flex",alignItems:"center",justifyContent:"center"}}>

// ═══════════════════ SPLASH ═══════════════════

function Splash({onNew,onContinue,hasSave,savedMeta,onFullscreen}){
  const[installable,setInstallable]=useState(!!window._pwaInstallPrompt);
  const[installed,setInstalled]=useState(false);

  useEffect(()=>{
    function onInst(){ setInstallable(true); }
    function onDone(){ setInstalled(true); setInstallable(false); }
    window.addEventListener("pwa-installable",onInst);
    window.addEventListener("pwa-installed",onDone);
    return()=>{ window.removeEventListener("pwa-installable",onInst); window.removeEventListener("pwa-installed",onDone); };
  },[]);

  function installApp(){
    if(window._pwaInstallPrompt){
      window._pwaInstallPrompt.prompt();
      window._pwaInstallPrompt.userChoice.then(r=>{
        if(r.outcome==="accepted"){ setInstalled(true); setInstallable(false); }
        window._pwaInstallPrompt=null;
      });
    }
  }

  // Is already running as installed PWA?
  const isStandalone=window.matchMedia("(display-mode: standalone)").matches||window.navigator.standalone;

  function fmtTime(ts){
    if(!ts)return"";
    const diff=Date.now()-ts;
    if(diff<60000)return"just now";
    if(diff<3600000)return Math.floor(diff/60000)+" min ago";
    if(diff<86400000)return Math.floor(diff/3600000)+" hr ago";
    return new Date(ts).toLocaleDateString();
  }

  return <div style={{height:"100vh",background:"var(--bg)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",overflow:"hidden",position:"relative"}}>
    <Stars/>
    <div style={{position:"relative",zIndex:1,textAlign:"center",padding:"0 24px",width:"100%",maxWidth:340}}>
      <h1 style={{fontFamily:"'Cinzel',serif",fontSize:"clamp(2.4rem,11vw,3.8rem)",fontWeight:900,color:"#fff",lineHeight:1.02,marginBottom:48,textShadow:"0 0 80px #c9a84c22",animation:"fadeUp .8s ease"}}>
        Reign of<br/>Swords
      </h1>
      <div style={{display:"flex",flexDirection:"column",gap:14,animation:"fadeUp .8s ease .15s both"}}>
        {hasSave&&savedMeta&&(
          <div onClick={onContinue} style={{background:"var(--bg2)",border:"2px solid var(--accent)",borderRadius:14,padding:"14px 18px",cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:12}}>
            <div style={{flex:1}}>
              <div style={{fontFamily:"'Cinzel',serif",fontSize:".72rem",color:"var(--text4)",textTransform:"uppercase",letterSpacing:1,marginBottom:3}}>Continue</div>
              <div style={{fontFamily:"'Cinzel',serif",fontSize:"1rem",color:"var(--text2)"}}>{savedMeta.name}</div>
              <div style={{fontSize:".75rem",color:"var(--text3)",marginTop:2}}>{savedMeta.cls} · Saved {fmtTime(savedMeta.savedAt)}</div>
            </div>
            <div style={{fontSize:"1.4rem",color:"var(--accent)"}}>→</div>
          </div>
        )}
        <Btn onClick={onNew} size="lg" full variant={hasSave?"outline":"primary"}>New Game</Btn>

        {/* Install button — show when installable and not already standalone */}
        {installable&&!isStandalone&&!installed&&(
          <Btn onClick={installApp} variant="outline" size="md" full style={{borderColor:"#7c3aed88",color:"var(--accent)"}}>
            ⊕ Install App
          </Btn>
        )}
        {installed&&<div style={{fontSize:".75rem",color:"#86efac",textAlign:"center",fontFamily:"'Cinzel',serif"}}>✓ Installed — find it on your home screen</div>}

        {!isStandalone&&(
          <Btn onClick={onFullscreen} variant="ghost" size="sm" full>⛶ Full Screen</Btn>
        )}

        {/* iOS install hint — iOS doesn't support beforeinstallprompt */}
        {!installable&&!isStandalone&&!installed&&/iphone|ipad|ipod/i.test(navigator.userAgent)&&(
          <div style={{fontSize:".72rem",color:"var(--text4)",lineHeight:1.6,padding:"10px 0"}}>
            To install: tap <strong style={{color:"var(--text3)"}}>Share</strong> → <strong style={{color:"var(--text3)"}}>Add to Home Screen</strong>
          </div>
        )}
      </div>
    </div>
  </div>;
}

function ApiKeyGate({onSet}){
  const[key,setKey]=useState("");
  const[testing,setTesting]=useState(false);
  const[err,setErr]=useState("");
  async function test(){
    setTesting(true);setErr("");
    try{await callClaude(key.trim(),"Reply: OK",[{role:"user",content:"ping"}],10);onSet(key.trim());}
    catch(e){setErr("Error: "+e.message);}setTesting(false);
  }
  return <div style={{height:"100vh",background:"var(--bg)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"0 24px",position:"relative"}}>
    <Stars count={25}/>
    <div style={{position:"relative",zIndex:1,width:"100%",maxWidth:400}}>
      <div style={{fontFamily:"'Cinzel',serif",fontSize:"1.35rem",color:"var(--text2)",marginBottom:8,textAlign:"center"}}>API Key Required</div>
      <div style={{fontSize:".85rem",color:"var(--text4)",marginBottom:22,textAlign:"center",lineHeight:1.65}}>Enter your Anthropic API key to power the AI Dungeon Master. Keys are stored in your browser only.</div>
      <input type="password" value={key} onChange={e=>setKey(e.target.value)} onKeyDown={e=>e.key==="Enter"&&test()} placeholder="sk-ant-..." style={{display:"block",width:"100%",background:"var(--bg3)",border:"1px solid var(--border2)",borderRadius:10,padding:"12px 14px",color:"var(--text)",fontSize:"1rem",marginBottom:10}}/>
      {err&&<div style={{color:"#ef4444",fontSize:".78rem",marginBottom:10}}>{err}</div>}
      <Btn onClick={test} disabled={testing||!key.trim()} full size="lg">{testing?"Connecting...":"Connect"}</Btn>
      <div style={{fontSize:".68rem",color:"var(--text4)",marginTop:14,textAlign:"center"}}>Get a key at console.anthropic.com</div>
    </div>
  </div>;
}

// ═══════════════════ APP ROOT ═══════════════════

function App(){
  const[screen,setScreen]=useState("splash");
  const[character,setCharacter]=useState(null);
  const[scenario,setScenario]=useState(null);
  const[settings,setSettings]=useState({violence:2,nsfw:false,autoRoll:false});
  const[completedIds,setCompletedIds]=useState([]);
  const[apiKey,setApiKey]=useState("");
  const[lightMode,setLightMode]=useState(false);
  const[globalSettingsOpen,setGlobalSettingsOpen]=useState(false);
  const[restoreData,setRestoreData]=useState(null); // full game state for resume

  // Read save metadata for splash display
  const savedRaw = localStorage.getItem(SAVE_KEY);
  const savedMeta = useMemo(()=>{
    try{ const s=JSON.parse(savedRaw); return s?.char?{name:s.char.name,cls:s.char.cls,savedAt:s.savedAt}:null; }
    catch{ return null; }
  },[savedRaw]);
  const hasSave = !!savedMeta;

  // Apply light/dark mode to body
  useEffect(()=>{
    document.body.classList.toggle("light",lightMode);
  },[lightMode]);

  // Keyboard viewport fix — push body up when keyboard appears
  useEffect(()=>{
    if(!window.visualViewport)return;
    function onVVResize(){
      const gap=window.innerHeight-window.visualViewport.height;
      document.getElementById("root").style.marginBottom=gap>50?gap+"px":"0px";
    }
    window.visualViewport.addEventListener("resize",onVVResize);
    return()=>window.visualViewport.removeEventListener("resize",onVVResize);
  },[]);

  // Hardware back button — navigate within app instead of closing
  useEffect(()=>{
    function onBack(){
      // Navigate based on current screen
      if(screen==="game")       { setScreen("scenarios"); return; }
      if(screen==="scenarios")  { setScreen("splash");    return; }
      if(screen==="create")     { setScreen("splash");    return; }
      if(screen==="apikey")     { setScreen("splash");    return; }
      // On splash, let the OS handle it (exit) — don't intercept
      // But we've already pushed a history entry, so it just pops to the previous page
    }
    window.addEventListener("hardware-back", onBack);
    return()=>window.removeEventListener("hardware-back", onBack);
  },[screen]);

  function enterFullscreen(){
    const el=document.documentElement;
    if(el.requestFullscreen)el.requestFullscreen();
    else if(el.webkitRequestFullscreen)el.webkitRequestFullscreen();
    else if(el.mozRequestFullScreen)el.mozRequestFullScreen();
  }

  function loadSave(){
    try{
      const s=JSON.parse(localStorage.getItem(SAVE_KEY));
      if(!s?.char) return;
      setCharacter(s.char);
      setScenario(s.scenario||null);
      setSettings(s.settings||{violence:2,nsfw:false,autoRoll:false});
      setCompletedIds(s.completedIds||[]);
      if(s.apiKey) setApiKey(s.apiKey);
      // Pass full session data for restoration
      setRestoreData({
        msgs: s.msgs||[],
        disp: s.disp||[],
        summary: s.summary||"",
        flags: s.flags||{legacy:[],npcs:{},quests:[]},
        combat: s.combat||{active:false,combatants:[],round:1,turnIdx:0,log:[]},
      });
      setScreen("game");
    }catch(e){ console.warn("Save load error",e); }
  }

  return <>
    {screen==="splash"    &&<Splash onNew={()=>setScreen("apikey")} onContinue={loadSave} hasSave={hasSave} savedMeta={savedMeta} onFullscreen={enterFullscreen}/>}
    {screen==="apikey"    &&<ApiKeyGate onSet={k=>{setApiKey(k);setScreen("create");}}/>}
    {screen==="create"    &&<CharCreation apiKey={apiKey} onComplete={ch=>{setCharacter(ch);setScreen("scenarios");}}/>}
    {screen==="scenarios" &&character&&<ScenarioSelect character={character} completedIds={completedIds} settings={settings} setSettings={setSettings} onBegin={(sc,ch)=>{setScenario(sc);if(ch)setCharacter(ch);setScreen("game");}} onNewChar={()=>setScreen("create")}/>}
    {screen==="game"      &&character&&<GameScreen character={character} scenario={scenario} settings={settings} setSettings={setSettings} completedIds={completedIds} apiKey={apiKey} restoreData={restoreData} onCompleteScenario={sc=>{if(sc)setCompletedIds(ids=>[...new Set([...ids,sc.id])]);setScreen("scenarios");}} onReturnToMenu={()=>{setRestoreData(null);setScreen("scenarios");}}/>}
    <GlobalSettingsBtn onClick={()=>setGlobalSettingsOpen(true)}/>
    {globalSettingsOpen&&<GlobalSettings settings={settings} setSettings={setSettings} lightMode={lightMode} setLightMode={setLightMode} apiKey={apiKey} onClose={()=>setGlobalSettingsOpen(false)}/>}
  </>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
